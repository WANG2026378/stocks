<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川普投顧 · 每日早報</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #07091a;
  color: #dde4f0;
  font-family: 'Segoe UI', '微軟正黑體', '蘋方-繁', sans-serif;
  min-height: 100vh;
}

/* ---- Header ---- */
.header {
  background: linear-gradient(135deg, #0f1428 0%, #0a0d1e 100%);
  border-bottom: 2px solid #c49a14;
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-icon { font-size: 36px; }
.header-title { font-size: 26px; font-weight: bold; color: #c49a14; letter-spacing: 1px; }
.header-date { font-size: 14px; color: #7788aa; margin-top: 3px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-clock { font-size: 18px; color: #aabbcc; font-variant-numeric: tabular-nums; }
.refresh-btn {
  background: #c49a14; color: #07091a; border: none;
  padding: 9px 18px; border-radius: 8px; cursor: pointer;
  font-size: 15px; font-weight: bold; transition: all .2s;
  white-space: nowrap;
}
.refresh-btn:hover { background: #e0b820; }
.refresh-btn:active { transform: scale(.96); }
.refresh-btn.loading { opacity: .6; pointer-events: none; }
.auto-toggle {
  display: flex; align-items: center; gap: 7px;
  background: #101526; border: 1px solid #1e2a48;
  border-radius: 8px; padding: 7px 12px; cursor: pointer;
  font-size: 13px; color: #7788aa; transition: all .2s;
  user-select: none; white-space: nowrap;
}
.auto-toggle:hover { border-color: #c49a14; color: #c49a14; }
.auto-toggle.active { border-color: #00cc88; color: #00cc88; background: #0d1e18; }
.countdown-ring { position: relative; width: 22px; height: 22px; flex-shrink: 0; }
.countdown-ring svg { transform: rotate(-90deg); }
.countdown-ring circle { fill: none; stroke-width: 3; }
.ring-bg { stroke: #2a3455; }
.ring-fill { stroke: #00cc88; stroke-linecap: round; transition: stroke-dashoffset .9s linear; }
.countdown-num {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold; color: #00cc88;
}

/* ---- Market Bar ---- */
.market-bar {
  background: #0b0e20;
  border-bottom: 1px solid #1a2340;
  padding: 10px 20px;
  display: flex; gap: 10px; overflow-x: auto;
}
.market-bar::-webkit-scrollbar { height: 3px; }
.market-bar::-webkit-scrollbar-track { background: #0b0e20; }
.market-bar::-webkit-scrollbar-thumb { background: #2a3455; border-radius: 2px; }
.mkt-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 7px 14px;
  background: #101526; border: 1px solid #1e2a48;
  border-radius: 8px; white-space: nowrap; min-width: 90px;
}
.mkt-name { font-size: 11px; color: #7788aa; margin-bottom: 2px; }
.mkt-price { font-size: 16px; font-weight: bold; }
.mkt-chg { font-size: 12px; margin-top: 1px; }

/* ---- Portfolio Summary ---- */
.summary-bar {
  background: #0d1025;
  border-bottom: 1px solid #1a2340;
  padding: 10px 24px;
  display: flex; gap: 16px; flex-wrap: wrap;
}
.summary-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: #101526; border: 1px solid #1e2a48;
  border-radius: 8px;
}
.summary-label { font-size: 12px; color: #7788aa; }
.summary-value { font-size: 16px; font-weight: bold; color: #c49a14; }
.summary-change { font-size: 13px; }

/* ---- Main ---- */
.main { padding: 24px; max-width: 1200px; margin: 0 auto; }

/* ---- Section ---- */
.section { margin-bottom: 32px; }
.section-title {
  font-size: 18px; font-weight: bold; color: #c49a14;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid #1a2340;
  display: flex; align-items: center; gap: 8px;
}
.section-count {
  font-size: 13px; color: #556688; font-weight: normal;
  background: #101526; padding: 2px 8px; border-radius: 10px;
  margin-left: 4px;
}

/* ---- Stock Grid ---- */
.stocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 10px;
}

/* ---- Stock Button ---- */
.stock-btn {
  background: #101526;
  border: 1px solid #1e2a48;
  border-left: 3px solid #2a3455;
  border-radius: 12px;
  padding: 14px 12px;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
  display: block;
  position: relative;
  text-align: center;
}
.stock-btn:hover { transform: translateY(-3px); border-color: #c49a14; background: #141828; box-shadow: 0 6px 20px rgba(196,154,20,.1); }
/* 漲幅等級 */
.stock-btn.limit-btn    { border-left-color: #ff1111; background: #1e0505; border-color: #ff3333; box-shadow: 0 0 12px rgba(255,30,30,.35); }
.stock-btn.up-strong-btn{ border-left-color: #ff2222; background: #160606; }
.stock-btn.up-btn       { border-left-color: #ff5555; }
/* 跌幅等級 */
.stock-btn.limit-dn-btn { border-left-color: #00dd77; background: #031a0e; border-color: #00cc66; box-shadow: 0 0 12px rgba(0,200,100,.3); }
.stock-btn.dn-strong-btn{ border-left-color: #00bb66; background: #031209; }
.stock-btn.dn-btn       { border-left-color: #00cc88; }
.stock-btn.flat-btn     { border-left-color: #445577; }
/* 漲跌停標籤 */
.limit-tag { position:absolute; top:5px; left:50%; transform:translateX(-50%);
  font-size:9px; font-weight:bold; padding:1px 6px; border-radius:3px; white-space:nowrap; z-index:1; }
.limit-tag.up  { background:#ff1111; color:#fff; }
.limit-tag.dn  { background:#00bb66; color:#fff; }

.stock-code { font-size: 24px; font-weight: bold; color: #fff; letter-spacing: .5px; }
.stock-name { font-size: 13px; color: #778899; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stock-price { font-size: 26px; font-weight: bold; margin-top: 10px; line-height: 1; }
.stock-change { font-size: 15px; margin-top: 5px; }
.stock-shares { font-size: 14px; color: #8899aa; margin-top: 9px; font-weight: bold; }
.stock-value { font-size: 13px; color: #889aaa; margin-top: 3px; }
.stock-profit { font-size: 13px; margin-top: 3px; font-weight: bold; }
.stock-state { font-size: 10px; margin-top: 5px; padding: 1px 6px; border-radius: 4px; display: inline-block; background: #1a2340; color: #556688; }
.stock-state.盤中 { background: #0d2010; color: #00cc88; }
.stock-state.盤前 { background: #2a1a00; color: #ffaa44; }
.stock-state.盤後 { background: #1a1040; color: #9988ff; }
.stock-state.收盤 { background: #1a2340; color: #445577; }
.stock-state.昨收 { background: #1a2340; color: #556688; }
.stock-state.日內 { background: #101e30; color: #5599cc; }
.ext-link {
  position: absolute; bottom: 5px; right: 6px;
  font-size: 12px; color: #334466; text-decoration: none;
  opacity: 0; transition: opacity .15s; line-height: 1;
}
.stock-btn:hover .ext-link { opacity: 1; color: #c49a14; }
.stock-btn.refreshing { opacity: .55; pointer-events: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin .7s linear infinite; }

.up { color: #ff4444; }
.dn { color: #00cc88; }
.flat { color: #778899; }

/* ---- Hot Badge ---- */
.hot-badge {
  position: absolute; top: 5px; right: 6px;
  background: linear-gradient(135deg, #ff4444, #ff6622);
  color: #fff; font-size: 9px; font-weight: bold;
  padding: 2px 5px; border-radius: 4px;
  letter-spacing: .5px;
}
.otc-badge {
  position: absolute; top: 5px; left: 6px;
  background: #1a3060;
  color: #6699cc; font-size: 9px;
  padding: 1px 5px; border-radius: 4px;
}

/* ---- Skeleton ---- */
.skel {
  background: linear-gradient(90deg, #101526 25%, #1a2340 50%, #101526 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px; height: 22px; width: 75%; margin: 8px auto 0;
}
.skel-sm { height: 14px; width: 55%; margin: 4px auto 0; }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

/* ---- Quick Links ---- */
.quick-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.ql {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 18px;
  background: #101526; border: 1px solid #1e2a48;
  border-radius: 10px; color: #c49a14;
  text-decoration: none; font-size: 14px;
  transition: all .2s;
}
.ql:hover { background: #141828; border-color: #c49a14; transform: translateY(-1px); }

/* ---- Footer ---- */
.footer { font-size: 12px; color: #445566; text-align: center; padding: 20px 0 30px; }

/* ---- Mobile ---- */
@media (max-width: 600px) {
  .stocks-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stock-btn { padding: 12px 8px; }
  .stock-code { font-size: 20px; }
  .stock-price { font-size: 22px; }
  .stock-change { font-size: 13px; }
  .stock-shares { font-size: 13px; }
  .header-title { font-size: 20px; }
  .main { padding: 16px; }
  .summary-bar { padding: 10px 16px; }
}
</style>
</head>

.vtb-toggle{background:transparent;border:0;color:#aaa;font-size:12px;cursor:pointer;padding:6px 10px;transition:transform .25s;flex-shrink:0;}

.vtb-panel{position:fixed;top:var(--vtb-h);left:0;right:0;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--vtb-fg);z-index:99997;max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);border-top:1px solid #222;font:14px/1 -apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;}

.vtb-corner{position:fixed;top:calc(var(--vtb-h) + 10px);right:16px;z-index:99996;display:flex;align-items:center;gap:8px;background:#0a0a0a;color:#fff;border:1px solid #2a2a2a;border-radius:999px;padding:7px 14px 7px 12px;font:13px/1 -apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);transition:transform .15s,box-shadow .15s,border-color .15s;}

<script>
(function(){
  if(window.__VIP_TICKER_BOOTED)return;window.__VIP_TICKER_BOOTED=true;
  const PROXIES=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>u];
  const DEFAULT_TW=[
    {code:'0050',name:'元大台灣50'},{code:'2049',name:'上銀'},{code:'2301',name:'光寶科'},
    {code:'2308',name:'台達電'},{code:'2312',name:'金寶'},{code:'2330',name:'台積電'},
    {code:'3711',name:'日月光投控'},{code:'4585',name:'達明'},{code:'4908',name:'前鼎'},
    {code:'6285',name:'啟碁'},{code:'6829',name:'千附精密'},{code:'8033',name:'雷虎科技'},
  ];
  const DEFAULT_US=[
    {code:'TSM',name:'台積電ADR'},{code:'TSLA',name:'Tesla'},{code:'IONQ',name:'IonQ'},
    {code:'AVGO',name:'Broadcom'},{code:'GOOGL',name:'Alphabet'},{code:'QBTS',name:'D-Wave Quantum'},
    {code:'NVDA',name:'NVIDIA'},{code:'AMD',name:'AMD'},{code:'AAPL',name:'Apple'},
    {code:'IBM',name:'IBM'},{code:'LITE',name:'Lumentum'},{code:'SMR',name:'NuScale Power'},
    {code:'UUU',name:'American Shared'},{code:'QQQ',name:'Nasdaq 100 ETF'},
    {code:'BTC-USD',name:'Bitcoin'},{code:'MU',name:'Micron'},
  ];

  function getMarket(){
    if(document.body.dataset.market)return document.body.dataset.market;
    const fn=decodeURIComponent(location.pathname.split('/').pop()||'').toLowerCase();
    if(fn.includes('台股')||fn.includes('twstock')||fn.includes('tw_stock')||fn.includes('twstocks'))return 'tw';
    if(fn.includes('美股')||fn.includes('usstock')||fn.includes('us_stock')||fn.includes('usstocks'))return 'us';
    return 'both';
  }
  function readLS(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}}
  function loadHoldings(){
    const m=getMarket();
    const tw=readLS('twStocks')||DEFAULT_TW;
    const us=readLS('usStocks')||DEFAULT_US;
    let out=[];
    if(m==='tw'||m==='both')out=out.concat(tw.map(s=>({code:s.code,name:s.name||s.code,mkt:'tw'})));
    if(m==='us'||m==='both')out=out.concat(us.map(s=>({code:s.code,name:s.name||s.code,mkt:'us'})));
    return out;
  }
  function candidates(s){return s.mkt==='tw'?[`${s.code}.TW`,`${s.code}.TWO`]:[s.code];}
  async function _fetch(sym){
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;
    for(const p of PROXIES){
      try{
        const r=await fetch(p(url),{signal:AbortSignal.timeout(7000)});
        if(!r.ok)continue;
        const j=await r.json();
        const m=j?.chart?.result?.[0]?.meta;if(!m)continue;
        const price=m.regularMarketPrice;const prev=m.chartPreviousClose??m.previousClose;const post=m.postMarketPrice;
        if(price==null||prev==null)continue;
        const usePost=post!=null&&Math.abs(post-price)>0.001;const cur=usePost?post:price;
        return {price:cur,pct:((cur-prev)/prev)*100,isPost:usePost};
      }catch{}
    }
    return null;
  }
  async function fetchPrice(s){for(const sym of candidates(s)){const d=await _fetch(sym);if(d)return d;}return null;}
  async function fetchAll(list){
    const out=[];const N=4;
    for(let i=0;i<list.length;i+=N){
      const part=list.slice(i,i+N);
      const got=await Promise.all(part.map(async s=>({stock:s,data:await fetchPrice(s)})));
      out.push(...got);
    }
    return out;
  }
  function fmtPrice(p,mkt){if(p==null)return '—';if(mkt==='us')return p.toFixed(p<1?4:2);return p.toFixed(2);}
  function pctClass(p){if(p==null)return 'flat';if(p>0.005)return 'up';if(p<-0.005)return 'down';return 'flat';}
  function pctText(p){if(p==null)return '—';return (p>=0?'+':'')+p.toFixed(2)+'%';}

  let DATA=[],cursor=0,rotateTimer=null,panelOpen=false;
  const $=id=>document.getElementById(id);
  function els(){return{cur:$('vtbCurrent'),toggle:$('vtbToggle'),panel:$('vipTickerPanel'),list:$('vtbHoldingsList'),notify:$('vtbNotifyMsg'),count:$('vtbCount'),left:document.querySelector('#vipTickerBar .vtb-left'),corner:$('vipTickerCorner'),cornerStock:$('vtbCornerStock')};}

  function renderBar(){
    const E=els();const valid=DATA.filter(x=>x.data);
    if(!valid.length){
      const html=`<span class="vtb-code">--</span><span class="vtb-pct flat">尚未連線</span>`;
      E.cur.innerHTML=html;if(E.cornerStock)E.cornerStock.innerHTML=html;return;
    }
    const {stock,data}=valid[cursor%valid.length];
    E.cur.classList.add('fading');if(E.cornerStock)E.cornerStock.classList.add('fading');
    setTimeout(()=>{
      const flag=stock.mkt==='tw'?'🇹🇼':'🇺🇸';
      const html=`<span class="vtb-mkt">${flag}</span><span class="vtb-code">${stock.code}</span><span class="vtb-price">${fmtPrice(data.price,stock.mkt)}</span><span class="vtb-pct ${pctClass(data.pct)}">${pctText(data.pct)}</span>${data.isPost?'<span class="vtb-tag">盤後</span>':''}`;
      E.cur.innerHTML=html;E.cur.classList.remove('fading');
      if(E.cornerStock){E.cornerStock.innerHTML=html;E.cornerStock.classList.remove('fading');}
    },180);
  }
  function renderPanel(){
    const E=els();
    if(!DATA.length){E.list.innerHTML=`<div class="vtb-empty">未偵測到持倉資料</div>`;E.count.textContent='';return;}
    E.count.textContent=`共 ${DATA.length} 檔`;
    E.list.innerHTML=DATA.map(({stock,data})=>{
      const price=data?fmtPrice(data.price,stock.mkt):'—';
      const pct=data?pctText(data.pct):'—';
      const cls=data?pctClass(data.pct):'flat';
      const flag=stock.mkt==='tw'?'🇹🇼':'🇺🇸';
      const href=stock.mkt==='tw'?`https://tw.stock.yahoo.com/quote/${stock.code}`:`https://finance.yahoo.com/quote/${encodeURIComponent(stock.code)}`;
      return `<a class="vtb-row" href="${href}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none"><div class="vtb-row-left"><span class="vtb-row-code">${flag} ${stock.code}</span><span class="vtb-row-name">${stock.name||''}</span></div><div class="vtb-row-right"><span class="vtb-row-price">${price}</span><span class="vtb-row-pct ${cls}">${pct}</span>${data?.isPost?'<span class="vtb-tag">盤後</span>':''}</div></a>`;
    }).join('');
  }
  function setNotify(t,ok=true){els().notify.innerHTML=`<span style="color:${ok?'#22c55e':'#ff4d4f'}">●</span> ${t}`;}
  function startRotate(){clearInterval(rotateTimer);rotateTimer=setInterval(()=>{if(panelOpen)return;cursor++;renderBar();},4000);}
  function togglePanel(open){
    const E=els();panelOpen=open??!panelOpen;
    E.panel.classList.toggle('open',panelOpen);
    E.toggle.classList.toggle('open',panelOpen);
    if(E.corner)E.corner.classList.toggle('open',panelOpen);
  }

  function bind(){
    const E=els();
    E.toggle.addEventListener('click',e=>{e.stopPropagation();togglePanel();});
    E.left.addEventListener('click',e=>{e.stopPropagation();togglePanel();});
    if(E.corner)E.corner.addEventListener('click',e=>{e.stopPropagation();togglePanel();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&panelOpen)togglePanel(false);});
    document.addEventListener('click',e=>{if(panelOpen&&!e.target.closest('#vipTickerBar')&&!e.target.closest('#vipTickerPanel')&&!e.target.closest('#vipTickerCorner'))togglePanel(false);});
  }

  async function refresh(){
    const h=loadHoldings();
    if(!h.length){setNotify('未偵測到持倉',false);renderPanel();return;}
    setNotify('抓取即時行情中…');
    DATA=await fetchAll(h);
    const okN=DATA.filter(x=>x.data).length;
    const d=new Date();const t=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    setNotify(`資料更新於 ${t}　成功 ${okN}/${DATA.length} 檔　✓ 已最新版本`);
    cursor=0;renderBar();renderPanel();
  }

  function boot(){bind();refresh().then(startRotate);setInterval(refresh,60000);}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>

<script>
// ==================== 持倉資料 ====================
const TW = [
  { code:'2330', name:'台積電',    shares:2130,  mkt:'TW',  hot:true  },
  { code:'6285', name:'啟碁',      shares:18888, mkt:'TW',  hot:true  },
  { code:'2301', name:'光寶科',    shares:6668,  mkt:'TW',  hot:false },
  { code:'4908', name:'前鼎',      shares:1008,  mkt:'TWO', hot:true  },
  { code:'6829', name:'千附精密',  shares:1000,  mkt:'TWO', hot:true  },
  { code:'2308', name:'台達電',    shares:18,    mkt:'TW',  hot:true  },
  { code:'2312', name:'金寶',      shares:1000,  mkt:'TW',  hot:false },
  { code:'3711', name:'日月光投控',shares:8,     mkt:'TW',  hot:true  },
  { code:'4585', name:'達明',      shares:8,     mkt:'TW',  hot:true  },
  { code:'8033', name:'雷虎科技',  shares:25,    mkt:'TW',  hot:false },
  { code:'0050', name:'台灣50',    shares:5,     mkt:'TW',  hot:false },
];

const US = [
  { code:'TSM',   name:'台積電ADR', shares:50,  hot:false },
  { code:'TSLA',  name:'Tesla',     shares:83,  hot:false },
  { code:'IONQ',  name:'IonQ',      shares:478, hot:true  },
  { code:'AVGO',  name:'Broadcom',  shares:8,   hot:false },
  { code:'GOOGL', name:'Alphabet',  shares:8,   hot:false },
  { code:'QBTS',  name:'D-Wave',    shares:108, hot:true  },
];

const INDICES = [
  { sym:'^spx',    name:'S&P 500'  },
  { sym:'^ndx',    name:'NASDAQ'   },
  { sym:'nvda.us', name:'NVIDIA'   },
  { sym:'tsm.us',  name:'TSM ADR'  },
];

let usdtwd = 32;

// ==================== 工具函數 ====================
const fmt = (n, d=2) => n == null || isNaN(n) ? '--'
  : n >= 10000 ? n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})
  : n.toFixed(d);

const fmtPct = p => p == null || isNaN(p) ? '--'
  : (p>=0?'+':'')+p.toFixed(2)+'%';

const fmtWan = v => {
  if (v >= 100000000) return (v/100000000).toFixed(1)+'億';
  if (v >= 10000)     return (v/10000).toFixed(1)+'萬';
  return v.toLocaleString();
};

const cc = p => p == null || isNaN(p) ? 'flat' : p > 0.05 ? 'up' : p < -0.05 ? 'dn' : 'flat';
const arrow = p => p > 0.05 ? '▲' : p < -0.05 ? '▼' : '—';

// ==================== 資料來源（與台股智能分析.html 相同策略）====================
// 優先直連 Yahoo Finance（瀏覽器有 .yahoo.com cookie 就通過驗證）
// 失敗才走 corsproxy.io/?url= → allorigins.win/raw?url=

function buildPriceSources(sym) {
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;
  return [
    base,
    base.replace('query1', 'query2'),
    `https://corsproxy.io/?url=${encodeURIComponent(base)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(base)}`,
  ];
}

async function fetchPriceBySym(sym) {
  for (const url of buildPriceSources(sym)) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(7000) });
      if (!res.ok) continue;
      const j = await res.json();
      const m = j?.chart?.result?.[0]?.meta;
      if (!m) continue;
      const price = m.regularMarketPrice;
      if (!price || price <= 0) continue;
      const prev  = m.chartPreviousClose || m.previousClose || price;
      const chg   = price - prev;
      const pct   = prev ? (chg / prev) * 100 : 0;
      const state = m.marketState ?? '';
      const label = state === 'REGULAR' ? '盤中' : state === 'PRE' ? '盤前' : state === 'POST' ? '盤後' : '收盤';
      return { price, prev, chg, pct, label };
    } catch {}
  }
  return null;
}

async function fetchRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(8000) });
    const d = await r.json();
    return d.rates?.TWD ?? 32;
  } catch { return 32; }
}

// ── 備用來源（Yahoo 全失敗時自動啟用）──
const CPROXY = s => `https://corsproxy.io/?url=${encodeURIComponent(s)}`;

async function fetchTWSE_backup() {
  try {
    const r = await fetch(CPROXY('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL'), { signal: AbortSignal.timeout(15000) });
    const d = await r.json();
    const map = {};
    for (const item of d) {
      const price = parseFloat(item.ClosingPrice), chg = parseFloat(item.Change);
      if (isNaN(price)) continue;
      const prev = price - chg, pct = prev ? (chg / prev) * 100 : 0;
      map[item.Code] = { price, prev, chg, pct, label: '昨收' };
    }
    return map;
  } catch { return {}; }
}

async function fetchTPEx_backup() {
  try {
    const r = await fetch(CPROXY('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes'), { signal: AbortSignal.timeout(15000) });
    const d = await r.json();
    const map = {};
    for (const item of d) {
      const price = parseFloat(item.Close), chg = parseFloat(item.Change);
      if (isNaN(price)) continue;
      const prev = price - chg, pct = prev ? (chg / prev) * 100 : 0;
      map[item.SecuritiesCompanyCode] = { price, prev, chg, pct, label: '昨收' };
    }
    return map;
  } catch { return {}; }
}

async function fetchStooq_backup(code) {
  try {
    const r = await fetch(CPROXY(`https://stooq.com/q/l/?s=${code.toLowerCase()}.us&f=sd2t2ohlcv&h&e=csv`), { signal: AbortSignal.timeout(8000) });
    const csv = await r.text();
    const cols = csv.trim().split('\n')[1]?.split(',');
    if (!cols || cols[6] === 'N/D') return null;
    const price = parseFloat(cols[6]), openP = parseFloat(cols[3]);
    if (isNaN(price) || price <= 0) return null;
    const chg = price - openP, pct = openP ? (chg / openP) * 100 : 0;
    return { price, prev: openP, chg, pct, label: '日內' };
  } catch { return null; }
}

// ==================== Render ====================
function renderBtn(s, isTW) {
  const sym  = isTW ? `${s.code}.${s.mkt}` : s.code;
  const link = isTW
    ? `https://tw.finance.yahoo.com/quote/${s.code}.${s.mkt}`
    : `https://finance.yahoo.com/quote/${s.code}`;
  const otcBadge = (isTW && s.mkt === 'TWO') ? '<span class="otc-badge">櫃</span>' : '';
  const hotBadge = s.hot ? '<span class="hot-badge">HOT</span>' : '';
  return `
    <div class="stock-btn flat-btn" id="btn-${s.code}"
         onclick="refreshStock('${s.code}','${sym}',${isTW})">
      ${otcBadge}${hotBadge}
      <a class="ext-link" href="${link}" target="_blank"
         onclick="event.stopPropagation()" title="開啟 Yahoo Finance">↗</a>
      <div class="stock-code">${s.code}</div>
      <div class="stock-name">${s.name}</div>
      <div class="skel" id="px-${s.code}"></div>
      <div class="skel skel-sm" id="ch-${s.code}"></div>
      <div class="stock-shares">${s.shares > 0 ? s.shares.toLocaleString()+' 股' : '觀察'}</div>
      <div class="stock-value" id="vl-${s.code}"></div>
      <div class="stock-profit" id="pf-${s.code}"></div>
      <div class="stock-state" id="st-${s.code}"></div>
    </div>`;
}

function patchBtn(s, data, isTW) {
  const btn = document.getElementById(`btn-${s.code}`);
  const pxEl = document.getElementById(`px-${s.code}`);
  const chEl = document.getElementById(`ch-${s.code}`);
  const vlEl = document.getElementById(`vl-${s.code}`);
  if (!btn) return;

  if (!data) {
    btn.className = 'stock-btn flat-btn';
    pxEl.className = 'stock-price flat'; pxEl.textContent = '--';
    chEl.className = 'stock-change flat'; chEl.textContent = '無法取得';
    return;
  }

  const p = data.pct;
  let btnCls, priceCls, limitTag = '';
  if      (p >= 9.5)   { btnCls='limit-btn';     priceCls='up'; limitTag='<span class="limit-tag up">漲停</span>'; }
  else if (p >= 3)     { btnCls='up-strong-btn'; priceCls='up'; }
  else if (p > 0.05)   { btnCls='up-btn';        priceCls='up'; }
  else if (p <= -9.5)  { btnCls='limit-dn-btn';  priceCls='dn'; limitTag='<span class="limit-tag dn">跌停</span>'; }
  else if (p <= -3)    { btnCls='dn-strong-btn'; priceCls='dn'; }
  else if (p < -0.05)  { btnCls='dn-btn';        priceCls='dn'; }
  else                 { btnCls='flat-btn';       priceCls='flat'; }

  btn.className = `stock-btn ${btnCls}`;

  // 漲跌停標籤（移除舊的再插入）
  btn.querySelectorAll('.limit-tag').forEach(el => el.remove());
  if (limitTag) btn.insertAdjacentHTML('afterbegin', limitTag);

  pxEl.className = `stock-price ${priceCls}`;
  pxEl.textContent = (isTW ? 'NT$' : '$') + fmt(data.price);

  chEl.className = `stock-change ${priceCls}`;
  chEl.textContent = `${arrow(data.pct)} ${fmt(Math.abs(data.chg))} (${fmtPct(data.pct)})`;

  const pfEl = document.getElementById(`pf-${s.code}`);
  if (s.shares > 0 && data.price) {
    const val = s.shares * data.price;
    const profit = s.shares * data.chg;
    const sign = profit >= 0 ? '+' : '';
    if (isTW) {
      vlEl.textContent = `市值 NT$${fmtWan(val)}`;
      if (pfEl) {
        pfEl.className = `stock-profit ${priceCls}`;
        pfEl.textContent = `日損益 ${sign}NT$${fmtWan(profit)}`;
      }
    } else {
      const twd = val * usdtwd;
      const profitTwd = profit * usdtwd;
      vlEl.innerHTML = `市值 $${val.toLocaleString('en-US',{maximumFractionDigits:0})}<br><span style="color:#6677aa;font-size:11px;">≈ NT$${fmtWan(twd)}</span>`;
      if (pfEl) {
        pfEl.className = `stock-profit ${priceCls}`;
        pfEl.innerHTML = `日損益 ${sign}$${Math.abs(profit).toFixed(0)}<br><span style="font-size:11px;">≈${sign}NT$${fmtWan(Math.abs(profitTwd))}</span>`;
      }
    }
  }

  const stEl = document.getElementById(`st-${s.code}`);
  if (stEl && data.label) {
    stEl.textContent = data.label;
    stEl.className = `stock-state ${data.label}`;
  }
}

// ==================== Market Bar ====================
function patchMarket(results) {
  const bar = document.getElementById('marketBar');
  // 匯率固定顯示在第一格
  const fxHtml = `<div class="mkt-item" style="border:1px solid #2a3a5a;">
    <div class="mkt-name">💱 USD/TWD</div>
    <div class="mkt-price flat" id="fxInBar">${usdtwd.toFixed(3)}</div>
    <div class="mkt-chg flat">open.er-api</div>
  </div>`;
  bar.innerHTML = fxHtml + results.map(({idx, data}) => {
    if (!data) return `<div class="mkt-item"><div class="mkt-name">${idx.name}</div><div class="mkt-price flat">--</div><div class="mkt-chg flat">--</div></div>`;
    const c = cc(data.pct);
    return `<div class="mkt-item">
      <div class="mkt-name">${idx.name}</div>
      <div class="mkt-price ${c}">${fmt(data.price)}</div>
      <div class="mkt-chg ${c}">${arrow(data.pct)} ${fmtPct(data.pct)}</div>
    </div>`;
  }).join('');
}

// ==================== Portfolio Summary ====================
function updateSummary(twResults, usResults) {
  let twVal = 0, twChg = 0, usVal = 0, usChg = 0;
  TW.forEach((s, i) => {
    const d = twResults[i];
    if (d && s.shares > 0) { twVal += s.shares * d.price; twChg += s.shares * d.chg; }
  });
  US.forEach((s, i) => {
    const d = usResults[i];
    if (d && s.shares > 0) { usVal += s.shares * d.price; usChg += s.shares * d.chg; }
  });

  // 台股
  const twC = twChg >= 0 ? 'up' : 'dn';
  document.getElementById('twTotal').textContent = `NT$ ${fmtWan(twVal)}`;
  document.getElementById('twTotalChg').className = `summary-change ${twC}`;
  document.getElementById('twTotalChg').textContent = `${arrow(twChg)} NT$ ${fmtWan(Math.abs(twChg))}`;

  // 美股：顯示美元 + 台幣換算
  const usTwd = usVal * usdtwd;
  const usChgTwd = usChg * usdtwd;
  const usC = usChg >= 0 ? 'up' : 'dn';
  document.getElementById('usTotal').textContent =
    `$${usVal.toLocaleString('en-US',{maximumFractionDigits:0})}`;
  document.getElementById('usTotalTwd').textContent = `NT$ ${fmtWan(usTwd)}`;
  document.getElementById('usTotalChg').className = `summary-change ${usC}`;
  document.getElementById('usTotalChg').textContent = `${arrow(usChg)} $${Math.abs(usChg).toFixed(0)}`;
  document.getElementById('usTotalTwdChg').className = `summary-change ${usC}`;
  document.getElementById('usTotalTwdChg').textContent = `${arrow(usChgTwd)} NT$ ${fmtWan(Math.abs(usChgTwd))}`;

  // 合計（全台幣計價）
  const grand = twVal + usTwd;
  const grandChg = twChg + usChgTwd;
  const gC = grandChg >= 0 ? 'up' : 'dn';
  document.getElementById('grandTotal').textContent = `NT$ ${fmtWan(grand)}`;
  document.getElementById('grandChg').className = `summary-change ${gC}`;
  document.getElementById('grandChg').textContent = `${arrow(grandChg)} NT$ ${fmtWan(Math.abs(grandChg))}`;
}

// ==================== Main Fetch ====================
async function fetchAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent = '更新中...';
  document.getElementById('footer').textContent = '更新中...';

  // ① 主要：Yahoo Finance（query1 → query2 → corsproxy → allorigins）
  const twSyms  = TW.map(s => `${s.code}.${s.mkt}`);
  const usSyms  = US.map(s => s.code);
  const idxSyms = INDICES.map(i => i.sym);

  let [twArr, usArr, idxArr, rate] = await Promise.all([
    Promise.all(twSyms.map(sym  => fetchPriceBySym(sym).catch(() => null))),
    Promise.all(usSyms.map(sym  => fetchPriceBySym(sym).catch(() => null))),
    Promise.all(idxSyms.map(sym => fetchPriceBySym(sym).catch(() => null))),
    fetchRate(),
  ]);

  // ② 備用：若台股有缺，改用 TWSE/TPEx OpenAPI
  const twFailed = twArr.some(d => !d);
  const usFailed = usArr.some(d => !d);
  let src = 'Yahoo Finance';

  if (twFailed) {
    const [twseMap, tpexMap] = await Promise.all([fetchTWSE_backup(), fetchTPEx_backup()]);
    twArr = TW.map((s, i) => twArr[i] ?? (s.mkt === 'TWO' ? tpexMap : twseMap)[s.code] ?? null);
    if (twArr.some(d => d)) src = 'Yahoo Finance + TWSE/TPEx 備援';
  }

  // ③ 備用：若美股有缺，改用 Stooq
  if (usFailed) {
    const stooqArr = await Promise.all(US.map(s => fetchStooq_backup(s.code)));
    usArr = usArr.map((d, i) => d ?? stooqArr[i]);
    if (usArr.some(d => d)) src = src.includes('備援') ? 'TWSE/TPEx + Stooq 備援' : 'Yahoo Finance + Stooq 備援';
  }

  // 匯率
  usdtwd = rate;
  document.getElementById('fxRate').textContent = rate.toFixed(3);
  const fxEl = document.getElementById('fxInBar');
  if (fxEl) fxEl.textContent = rate.toFixed(3);

  // 大盤列
  patchMarket(INDICES.map((idx, i) => ({ idx, data: idxArr[i] })));

  // 台股 / 美股按鈕
  TW.forEach((s, i) => patchBtn(s, twArr[i], true));
  US.forEach((s, i) => patchBtn(s, usArr[i], false));

  // 總市值
  updateSummary(twArr, usArr);

  const now = new Date();
  document.getElementById('footer').textContent =
    `最後更新：${now.toLocaleTimeString('zh-TW')} ── ${src}`;

  btn.classList.remove('loading'); btn.textContent = '⟳ 更新';
}

// ==================== 單支即時刷新 ====================
async function refreshStock(code, sym, isTW) {
  const btn  = document.getElementById(`btn-${code}`);
  const pxEl = document.getElementById(`px-${code}`);
  if (!btn || btn.classList.contains('refreshing')) return;

  btn.classList.add('refreshing');
  const origHTML = pxEl.innerHTML;
  pxEl.className = 'stock-price flat';
  pxEl.innerHTML = '<span class="spin">⟳</span>';

  const data = await fetchPriceBySym(sym).catch(() => null);
  btn.classList.remove('refreshing');

  if (data) {
    const stock = isTW ? TW.find(s => s.code === code) : US.find(s => s.code === code);
    if (stock) patchBtn(stock, data, isTW);
  } else {
    pxEl.innerHTML = origHTML; // 還原
  }
}

// ==================== 自動更新 ====================
const AUTO_INTERVAL = 60; // 秒
let autoOn = false;
let autoTimer = null;
let countdown = AUTO_INTERVAL;
let countdownTimer = null;
const CIRC = 50.3; // 2π×8

function toggleAuto() {
  autoOn = !autoOn;
  const toggle = document.getElementById('autoToggle');
  const label  = document.getElementById('autoLabel');
  const ring   = document.getElementById('countdownRing');
  if (autoOn) {
    toggle.classList.add('active');
    label.textContent = '▶ 自動更新';
    ring.style.display = 'flex';
    startCountdown();
  } else {
    toggle.classList.remove('active');
    label.textContent = '⏸ 自動更新';
    ring.style.display = 'none';
    clearTimeout(autoTimer);
    clearInterval(countdownTimer);
  }
}

function startCountdown() {
  clearTimeout(autoTimer);
  clearInterval(countdownTimer);
  countdown = AUTO_INTERVAL;
  updateRing();

  countdownTimer = setInterval(() => {
    countdown--;
    if (countdown < 0) countdown = AUTO_INTERVAL;
    updateRing();
  }, 1000);

  autoTimer = setTimeout(function loop() {
    if (!autoOn) return;
    fetchAll();
    countdown = AUTO_INTERVAL;
    autoTimer = setTimeout(loop, AUTO_INTERVAL * 1000);
  }, AUTO_INTERVAL * 1000);
}

function updateRing() {
  const pct = countdown / AUTO_INTERVAL;
  const offset = CIRC * (1 - pct);
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('countdownNum').textContent = countdown;
}

// ==================== Init ====================
function init() {
  const WD = ['日','一','二','三','四','五','六'];
  const tick = () => {
    const n = new Date();
    document.getElementById('hDate').textContent =
      `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日（${WD[n.getDay()]}）`;
    document.getElementById('hClock').textContent = n.toLocaleTimeString('zh-TW');
  };
  tick();
  setInterval(tick, 1000);

  document.getElementById('twGrid').innerHTML = TW.map(s => renderBtn(s, true)).join('');
  document.getElementById('usGrid').innerHTML = US.map(s => renderBtn(s, false)).join('');

  fetchAll();
}

init();
</script>

<script id="vip-nav-script">
(function(){
  if (window.__vipNavLoaded) return;
  window.__vipNavLoaded = true;
  var TOOLS = [
    {emoji:'🏠', name:'首頁', file:'首頁.html', cat:'入口'},
    {emoji:'🇹🇼', name:'台股分析', file:'台股智能分析.html', cat:'智能分析'},
    {emoji:'🇺🇸', name:'美股分析', file:'美股智能分析.html', cat:'智能分析'},
    {emoji:'🧠', name:'聰明錢', file:'股票聰明錢分析.html', cat:'智能分析'},
    {emoji:'📰', name:'台股情報', file:'tw_news/', cat:'每日情報'},
    {emoji:'📡', name:'美股情報', file:'news/', cat:'每日情報'},
    {emoji:'☀️', name:'每日早報', file:'每日早報.html', cat:'每日情報'},
    {emoji:'💰', name:'損益追蹤', file:'index.html', cat:'生活工具'},
    {emoji:'🏡', name:'房地產', file:'房地產搜尋.html', cat:'生活工具'},
    {emoji:'🎵', name:'音樂', file:'音樂播放器.html', cat:'生活工具'},
    {emoji:'🕐', name:'時鐘', file:'時鐘.html', cat:'生活工具'},
    {emoji:'📥', name:'台股匯入', file:'import.html', cat:'匯入'},
    {emoji:'📥', name:'美股匯入', file:'us_import.html', cat:'匯入'}
  ];
  // 自動偵測站根：找 path 裡的 "stocks" 或 "Downloads" 當作站根
  var path = decodeURIComponent(window.location.pathname);
  var parts = path.split('/').filter(Boolean);
  var rootKeys = ['stocks','Downloads'];
  var rootIdx = -1;
  for (var k=0;k<rootKeys.length;k++) {
    var ix = parts.indexOf(rootKeys[k]);
    if (ix >= 0) { rootIdx = ix; break; }
  }
  // 區分 path 結尾是檔案還是目錄；目錄會以 "/" 結尾
  var endsWithSlash = path.charAt(path.length - 1) === '/';
  // 站根後的 segment 數 = parts.length - rootIdx - 1（扣掉 root segment 本身）
  // 檔案路徑：最後一段是檔名，不算 depth；目錄：所有段都算 depth
  var depth = rootIdx >= 0
    ? Math.max(0, parts.length - rootIdx - (endsWithSlash ? 1 : 2))
    : 0;
  var base = depth > 0 ? new Array(depth+1).join('../') : '';
  // 偵測目前頁
  var here = parts[parts.length-1] || '';
  var current = null;
  TOOLS.forEach(function(t){
    var fn = t.file.replace(/\/$/,'');
    if (here === fn || (here === '' && t.file === '首頁.html') ||
        (path.indexOf('/'+fn+'/') >= 0 && t.file.indexOf('/') >= 0)) {
      current = t.name;
    }
  });
  // 建立浮動鈕
  var btn = document.createElement('button');
  btn.className = 'vip-nav-fab';
  btn.title = '工具切換';
  btn.setAttribute('aria-label','工具切換');
  btn.textContent = '🧭';
  // 建立遮罩
  var mask = document.createElement('div');
  mask.className = 'vip-nav-mask';
  // 建立面板
  var panel = document.createElement('div');
  panel.className = 'vip-nav-panel';
  var byCat = {}, catOrder = [];
  TOOLS.forEach(function(t){ if (!byCat[t.cat]) { byCat[t.cat] = []; catOrder.push(t.cat); } byCat[t.cat].push(t); });
  var html = '<div class="vip-nav-title">🧭 川普投顧 VIP 工具箱<button class="vip-nav-close" aria-label="關閉">×</button></div>';
  html += '<div class="vip-nav-sub">王川銘 — 一鍵切換所有工具</div>';
  catOrder.forEach(function(cat){
    html += '<div class="vip-nav-cat">'+cat+'</div><div class="vip-nav-grid">';
    byCat[cat].forEach(function(t){
      var cls = 'vip-nav-item' + (t.name === current ? ' current' : '');
      html += '<a class="'+cls+'" href="'+base+t.file+'"><div class="vip-nav-emoji">'+t.emoji+'</div><div>'+t.name+'</div></a>';
    });
    html += '</div>';
  });
  panel.innerHTML = html;
  function attach(){
    document.body.appendChild(btn);
    document.body.appendChild(mask);
    document.body.appendChild(panel);
    btn.addEventListener('click', function(){ mask.classList.add('show'); panel.classList.add('show'); });
    mask.addEventListener('click', function(){ mask.classList.remove('show'); panel.classList.remove('show'); });
    panel.querySelector('.vip-nav-close').addEventListener('click', function(){ mask.classList.remove('show'); panel.classList.remove('show'); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') { mask.classList.remove('show'); panel.classList.remove('show'); } });
  }
  if (document.body) attach(); else document.addEventListener('DOMContentLoaded', attach);
})();
</script>
