<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>股票損益追蹤器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f7f9;--bg3:#eef1f4;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0e0e0;--border2:#d0d0d0;
  --up:#d93025;--dn:#1d8a4f;
  --radius:8px;
  --acc:#1a6b6b;--acc2:#2a8a8a;--acc3:#e6f4f4;
}
.tw-mode{--acc:#1a6b6b;--acc2:#2a8a8a;--acc3:#e6f4f4;}
.us-mode{--acc:#1a3a6b;--acc2:#2a5298;--acc3:#e8eef8;}
body{font-family:-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
.app{max-width:1150px;margin:0 auto;padding:14px;}

/* ── 市場切換 ── */
.market-switch{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:14px;}
.mkt-btn{padding:8px 28px;font-size:14px;font-weight:500;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;}
.mkt-btn:first-child{border-radius:20px 0 0 20px;}
.mkt-btn:last-child{border-radius:0 20px 20px 0;}
.mkt-btn.active{background:var(--acc);color:#fff;border-color:var(--acc);}

.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.topbar h1{font-size:19px;font-weight:600;}
.sub{font-size:11px;color:var(--text2);margin-top:2px;}
.act{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.btn{font-size:12px;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;}
.btn:hover{background:var(--bg2);}
.btn.prim{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn.prim:hover{background:var(--acc2);}
.btn.green{background:#1d8a4f;color:#fff;border-color:#1d8a4f;}
.btn.green:hover{background:#166b3e;}

.fx-badge{display:inline-flex;align-items:center;gap:5px;background:var(--acc3);border:1px solid var(--acc2);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--acc);font-weight:600;}
.fx-badge input{width:58px;padding:2px 4px;font-size:12px;border:1px solid var(--acc2);border-radius:4px;background:rgba(255,255,255,0.9);color:var(--acc);font-weight:600;text-align:center;}

.sync-bar{display:flex;align-items:center;gap:8px;background:var(--acc3);border:1px solid var(--acc2);border-radius:8px;padding:7px 12px;margin-bottom:11px;flex-wrap:wrap;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.ok{background:#1d8a4f;}.sync-dot.err{background:#d93025;}.sync-dot.loading{background:#f0a500;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-text{font-size:12px;color:var(--text2);flex:1;}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:11px;overflow-x:auto;}
.tab{padding:7px 15px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:500;}
.tab:hover:not(.active){color:var(--text);}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:11px;}
.metric{background:var(--bg2);border-radius:var(--radius);padding:9px 11px;border:1px solid var(--border);}
.mlabel{font-size:11px;color:var(--text2);margin-bottom:2px;}
.mval{font-size:16px;font-weight:600;}
.msub{font-size:10px;color:var(--text3);margin-top:1px;}
.up{color:var(--up);}.dn{color:var(--dn);}

.tw{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;}
thead th{font-size:11px;font-weight:600;color:var(--text2);padding:7px 7px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;background:var(--bg2);}
thead th:first-child{text-align:left;}
thead th:hover{color:var(--acc);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--acc3);}
td{padding:6px 7px;text-align:right;font-size:12px;}
td:first-child{text-align:left;}
.sname{font-weight:600;font-size:12px;}.scode{font-size:10px;color:var(--text3);}
.sector-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--acc3);color:var(--acc);margin-top:1px;}
.ebtn{font-size:11px;padding:2px 6px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--text2);cursor:pointer;}

.sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 5px;}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:11px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:11px;}
.bar-label{width:68px;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.bar-track{flex:1;height:15px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.bar-val{width:110px;font-size:10px;flex-shrink:0;}

.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:11px;}
.hist-card{border:1px solid var(--border);border-radius:var(--radius);padding:9px;cursor:pointer;transition:all .15s;}
.hist-card:hover,.hist-card.active{border-color:var(--acc);background:var(--acc3);}
.hist-date{font-size:12px;font-weight:600;color:var(--acc);}
.hist-mv{font-size:13px;font-weight:600;margin-top:2px;}
.hist-pnl{font-size:11px;margin-top:1px;}
.hist-detail{border:1px solid var(--border);border-radius:var(--radius);padding:11px;background:var(--bg2);margin-bottom:11px;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px;width:330px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal h2{font-size:14px;font-weight:600;margin-bottom:12px;}
.frow{margin-bottom:9px;}
.frow label{display:block;font-size:11px;color:var(--text2);margin-bottom:2px;}
.frow input,.frow select{width:100%;padding:5px 8px;font-size:12px;border:1px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);}
.frow .hint{font-size:10px;color:var(--text3);margin-top:2px;}
.fact{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap;}
.delbtn{font-size:11px;padding:4px 9px;border:1px solid #d93025;border-radius:5px;background:transparent;color:#d93025;cursor:pointer;margin-right:auto;}

.price-badge{display:inline-block;font-size:10px;padding:1px 4px;border-radius:3px;background:var(--acc3);color:var(--acc);margin-left:3px;vertical-align:middle;}
.price-stale{background:#fff3cd;color:#856404;}
.twd-sub{font-size:10px;color:var(--text3);display:block;line-height:1.3;}
.news-btn{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border:0.5px solid var(--acc2);border-radius:10px;color:var(--acc);background:var(--acc3);cursor:pointer;text-decoration:none;white-space:nowrap;margin-top:3px;}
.news-btn:hover{background:var(--acc2);color:#fff;}
.news-row{padding:6px 8px 8px 8px;background:var(--bg2);border-bottom:1px solid var(--border);}
.news-row a{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--acc);text-decoration:none;margin:2px 4px 2px 0;padding:3px 8px;border:0.5px solid var(--border2);border-radius:5px;background:var(--bg);}
.news-row a:hover{background:var(--acc3);}
.news-loading{font-size:11px;color:var(--text3);padding:4px 8px;}
.footer{font-size:11px;color:var(--text3);margin-top:12px;text-align:right;}
.notice{font-size:11px;color:var(--text2);background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:7px 11px;margin-bottom:9px;}
.empty-state{text-align:center;padding:36px 16px;color:var(--text2);}
.empty-state .icon{font-size:36px;margin-bottom:10px;}
.live-bar{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 12px;margin-bottom:10px;flex-wrap:wrap;}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s;}
.live-dot.on{background:#1d8a4f;animation:livepulse 2s infinite;}
.live-dot.paused{background:#f0a500;}
.live-dot.closed{background:#aaa;}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(29,154,79,.5);}50%{box-shadow:0 0 0 5px rgba(29,154,79,0);}}
.live-label{font-size:12px;font-weight:500;color:var(--text);}
.live-info{font-size:11px;color:var(--text2);flex:1;}
.live-countdown{font-size:11px;color:var(--acc);font-weight:500;min-width:50px;text-align:right;}
.interval-btns{display:flex;gap:4px;}
.ivl-btn{font-size:11px;padding:2px 8px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg);color:var(--text2);cursor:pointer;}
.ivl-btn.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.price-up{color:var(--up)!important;}.price-dn{color:var(--dn)!important;}
.price-flash-up{animation:flashup .6s;}
.price-flash-dn{animation:flashdn .6s;}
@keyframes flashup{0%,100%{background:transparent;}40%{background:rgba(217,48,37,.12);}}
@keyframes flashdn{0%,100%{background:transparent;}40%{background:rgba(29,154,79,.12);}}

.sector-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.sf-btn{font-size:11px;padding:3px 9px;border:1px solid var(--border2);border-radius:12px;background:var(--bg);color:var(--text2);cursor:pointer;}
.sf-btn.active{background:var(--acc);color:#fff;border-color:var(--acc);}
</style>
</head>
<body>
<div class="app tw-mode" id="appRoot">

  <!-- 市場切換 -->
  <div class="market-switch">
    <button class="mkt-btn active" id="mktTW" onclick="switchMarket('TW')">🇹🇼 台股</button>
    <button class="mkt-btn" id="mktUS" onclick="switchMarket('US')">🇺🇸 美股</button>
  </div>

  <div class="topbar">
    <div>
      <div class="sub" id="userSub">持股損益追蹤</div>
      <h1 id="appTitle">台股損益追蹤器</h1>
    </div>
    <div class="act">
      <div class="fx-badge" id="fxBadge" style="display:none;">
        USD/TWD
        <input id="fxInput" type="number" step="0.01" value="32.50" onchange="onFxChange()" title="手動修改匯率"/>
        <span id="fxAutoTag" style="font-size:10px;opacity:.7;">更新時自動抓取</span>
      </div>
      <button class="btn green" onclick="fetchPrices()" id="syncBtn">⟳ 更新股價</button>
      <button class="btn" onclick="pullCentral()" title="從中央 holdings.json 同步持股清單（每日 14:00 / 06:00 排程更新）">☁️↓ 中央</button>
      <button class="btn" onclick="pushCentral()" title="把當前 localStorage 持股下載成 .stocks_holdings.json，手動覆蓋本機">☁️↑ 匯出</button>
      <button class="btn" onclick="exportCSV()">↓ 匯出</button>
      <button class="btn prim" onclick="openAdd()">＋ 新增</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <div class="sync-text" id="syncText">尚未同步。點擊「⟳ 更新股價」取得最新報價。</div>
    <button class="btn" style="font-size:11px;padding:3px 7px;" onclick="saveSnapshot()">📷 備份今日</button>
  </div>

  <!-- 即時更新控制列 -->
  <div class="live-bar" id="liveBar">
    <div class="live-dot closed" id="liveDot"></div>
    <div class="live-label" id="liveLabel">即時更新</div>
    <div class="live-info" id="liveInfo">點「▶ 啟動」開始自動更新股價</div>
    <div class="interval-btns" id="ivlBtns">
      <button class="ivl-btn" onclick="setIvl(10)">10秒</button>
      <button class="ivl-btn active" onclick="setIvl(30)">30秒</button>
      <button class="ivl-btn" onclick="setIvl(60)">1分</button>
      <button class="ivl-btn" onclick="setIvl(300)">5分</button>
    </div>
    <div class="live-countdown" id="liveCd"></div>
    <button class="btn" id="liveToggle" onclick="toggleLive()">▶ 啟動</button>
  </div>

  <div class="tabs" id="tabBar"></div>

  <div id="pageContent"></div>

  <div class="footer"><span id="ts">—</span> · 資料存於本機 · 離線可用</div>
</div>

<!-- 彈窗 -->
<div class="overlay" id="ov">
  <div class="modal">
    <h2 id="mtitle">新增股票</h2>
    <div class="frow"><label id="lcode">股票代碼</label><input id="fc" placeholder="例：2330 或 AAPL"/></div>
    <div class="frow"><label>股票名稱</label><input id="fn" placeholder="例：台積電"/></div>
    <div class="frow" id="sectorRow" style="display:none;">
      <label>類股分類</label>
      <select id="fsec">
        <option value="科技">科技 Technology</option>
        <option value="半導體">半導體 Semiconductor</option>
        <option value="AI/雲端">AI / 雲端</option>
        <option value="電動車">電動車 EV</option>
        <option value="金融">金融 Financial</option>
        <option value="消費">消費 Consumer</option>
        <option value="醫療">醫療 Healthcare</option>
        <option value="能源">能源 Energy</option>
        <option value="ETF">ETF / 指數基金</option>
        <option value="其他">其他 Other</option>
      </select>
    </div>
    <div class="frow"><label id="lshares">存股數（股）</label><input id="fs" type="number" placeholder="例：1000"/></div>
    <div class="frow"><label>市價</label><input id="fp" type="number" step="0.01" placeholder="例：850"/></div>
    <div class="frow" id="beRow"><label>損益兩平價</label><input id="fb" type="number" step="0.01" placeholder="選填"/></div>
    <div class="frow"><label>成交均價</label><input id="fa" type="number" step="0.01" placeholder="例：760"/></div>
    <div class="frow"><label id="lcost">投入成本</label><input id="fk" type="number" step="0.01" placeholder="總買入金額"/></div>
    <div class="frow" id="noteRow" style="display:none;"><label>備註</label><input id="fnote" placeholder="例：長期持有"/></div>
    <div class="fact">
      <button class="delbtn" id="delBtn" onclick="deleteStock()" style="display:none;">🗑 刪除</button>
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn prim" onclick="saveStock()">儲存</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// 常數 & 狀態
// ════════════════════════════════════════════════════════════════
const KEYS={
  TW:{stocks:'tw_stocks_v5',hist:'tw_hist_v1',prices:'tw_prices_v1'},
  US:{stocks:'us_stocks_v1',hist:'us_hist_v1',prices:'us_prices_v1'},
};
const USER_KEY='app_user_v1', FX_KEY='app_fx_v1';

let market='TW';
let stocks=[], editIdx=-1, lastPrices={}, fxRate=32.5;
let sortKey='mv', sortAsc=false, sort2Key='pnl', sort2Asc=false, sort3Key='mv', sort3Asc=false;
let charts={}, selHistDate=null, sectorFilter='全部';
let activeTab=1;

const SECTOR_COLORS={科技:'#378ADD',半導體:'#1D9E75','AI/雲端':'#7F77DD',電動車:'#E24B4A',金融:'#BA7517',消費:'#D4537E',醫療:'#639922',能源:'#D85A30',ETF:'#888780',其他:'#B4B2A9'};

// ════════════════════════════════════════════════════════════════
// 市場切換
// ════════════════════════════════════════════════════════════════
function switchMarket(m){
  market=m;
  document.getElementById('mktTW').classList.toggle('active',m==='TW');
  document.getElementById('mktUS').classList.toggle('active',m==='US');
  document.getElementById('appRoot').className='app '+(m==='TW'?'tw-mode':'us-mode');
  document.getElementById('appTitle').textContent=m==='TW'?'台股損益追蹤器':'美股損益追蹤器';
  document.getElementById('fxBadge').style.display=m==='US'?'inline-flex':'none';
  document.getElementById('beRow').style.display=m==='TW'?'':'none';
  document.getElementById('sectorRow').style.display=m==='US'?'':'none';
  document.getElementById('noteRow').style.display=m==='US'?'':'none';
  document.getElementById('lcode').textContent=m==='TW'?'股票代碼（台股四位）':'股票代碼（Ticker）';
  document.getElementById('lshares').textContent=m==='TW'?'存股數（股，1張=1000股）':'持股數（股）';
  document.getElementById('lcost').textContent=m==='TW'?'投入成本（含手續費）':'總成本（USD）';
  loadMarket(); activeTab=1; selHistDate=null; sectorFilter='全部';
  renderTabs(); render();
}

// ════════════════════════════════════════════════════════════════
// 儲存 / 載入
// ════════════════════════════════════════════════════════════════
// === 預設持股（2026/05/11 亮點未實現損益匯出，13檔台股 / 7檔美股）===
const TW_DEFAULTS=[
  {code:'0050',name:'元大台灣50',shares:5,price:96.85,be:45.66,avg:45.40,cost:227},
  {code:'2301',name:'光寶科',shares:7048,price:234.50,be:195.01,avg:193.88,cost:1368417},
  {code:'2308',name:'台達電',shares:18,price:2195.00,be:2232.98,avg:2220.00,cost:40016},
  {code:'2312',name:'金寶',shares:3000,price:29.45,be:29.57,avg:29.40,cost:88325},
  {code:'2324',name:'仁寶',shares:2000,price:29.90,be:31.88,avg:31.70,cost:63489},
  {code:'2330',name:'台積電',shares:2030,price:2255.00,be:1895.59,avg:1884.57,cost:3831148},
  {code:'3711',name:'日月光投控',shares:8,price:555.00,be:512.98,avg:510.00,cost:4100},
  {code:'4585',name:'達明',shares:8,price:339.00,be:325.39,avg:323.50,cost:2591},
  {code:'4908',name:'前鼎',shares:1008,price:237.00,be:143.32,avg:142.49,cost:143840},
  {code:'5243',name:'乙盛-KY',shares:108,price:103.50,be:124.72,avg:124.00,cost:13411},
  {code:'6285',name:'啟碁',shares:18188,price:282.00,be:242.28,avg:240.88,cost:4387359},
  {code:'6829',name:'千附精密',shares:2000,price:215.00,be:179.04,avg:178.00,cost:356506},
  {code:'8033',name:'雷虎',shares:25,price:141.50,be:161.94,avg:161.00,cost:4045},
];

const US_DEFAULTS=[
  {code:'IONQ',name:'IonQ',sector:'AI/雲端',shares:728,price:56.89,avg:46.4563,cost:33820.15,be:46.4563,note:''},
  {code:'QBTS',name:'D-Wave Quantum',sector:'AI/雲端',shares:218,price:24.03,avg:23.6732,cost:5160.76,be:23.6732,note:''},
  {code:'TSLA',name:'Tesla',sector:'電動車',shares:29,price:445.00,avg:408.3455,cost:11842.02,be:408.3455,note:''},
  {code:'MU',name:'Micron',sector:'半導體',shares:22,price:795.33,avg:570.1027,cost:12542.26,be:570.1027,note:''},
  {code:'TSM',name:'TSMC ADR',sector:'半導體',shares:18,price:404.54,avg:406.7633,cost:7321.74,be:406.7633,note:''},
  {code:'AVGO',name:'Broadcom',sector:'半導體',shares:8,price:428.43,avg:426.63,cost:3413.04,be:426.63,note:''},
  {code:'GOOGL',name:'Alphabet',sector:'科技',shares:18,price:388.64,avg:298.5133,cost:5373.24,be:298.5133,note:''},
];

function loadMarket(){
  const k=KEYS[market];
  try{stocks=JSON.parse(localStorage.getItem(k.stocks))||(market==='TW'?TW_DEFAULTS:US_DEFAULTS);}catch{stocks=market==='TW'?TW_DEFAULTS:US_DEFAULTS;}
  try{lastPrices=JSON.parse(localStorage.getItem(k.prices))||{};}catch{lastPrices={};}
  fxRate=parseFloat(localStorage.getItem(FX_KEY))||32.5;
  document.getElementById('fxInput').value=fxRate.toFixed(2);

    openNewsCode=null; return;
  }

  if(openNewsCode){const old=document.getElementById('nr_'+openNewsCode);if(old)old.remove();}

// ── 自動抓取即時 USD/TWD 匯率 ────────────────────────────────────
async function fetchFxRate(){
  const proxySources=[
    // Yahoo Finance USDTWD
    ()=>fetch('https://query1.finance.yahoo.com/v8/finance/chart/USDTWD=X?interval=1d&range=1d',{signal:AbortSignal.timeout(6000)}),
    ()=>fetch('https://query2.finance.yahoo.com/v8/finance/chart/USDTWD=X?interval=1d&range=1d',{signal:AbortSignal.timeout(6000)}),
    ()=>fetch(`https://corsproxy.io/?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/USDTWD=X?interval=1d&range=1d')}`,{signal:AbortSignal.timeout(7000)}),
    ()=>fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/USDTWD=X?interval=1d&range=1d')}`,{signal:AbortSignal.timeout(7000)}),
  ];
  for(const src of proxySources){
    try{
      const res=await src();
      if(!res.ok) continue;
      const j=await res.json();
      const meta=j?.chart?.result?.[0]?.meta;
      const rate=meta?.regularMarketPrice||meta?.previousClose;
      if(rate&&rate>20&&rate<60) return parseFloat(rate.toFixed(4));
    }catch{}
  }
  return null;
}

function buildProxies(sym){return[
  `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`,
  `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`,
  `https://corsproxy.io/?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=1d')}`,
  `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=1d')}`,
];}
async function fetchOnePrice(sym){
  for(const url of buildProxies(sym)){
    try{
      const res=await fetch(url,{signal:AbortSignal.timeout(7000)});
      if(!res.ok) continue;
      const j=await res.json();
      const meta=j?.chart?.result?.[0]?.meta;
      const p=meta?.regularMarketPrice||meta?.previousClose;
      if(p&&p>0) return p;
    }catch{}
  }
  return null;
}
async function fetchPrices(){
  if(!stocks.length){setSyncStatus('err','尚無持股，請先新增。');return;}
  setSyncStatus('loading','正在抓取報價...');
  document.getElementById('syncBtn').disabled=true;
  // 若為美股，先嘗試更新匯率
  if(market==='US'){
    setSyncStatus('loading','正在更新 USD/TWD 匯率...');
    const newFx=await fetchFxRate();
    if(newFx&&newFx!==fxRate){
      fxRate=newFx;
      document.getElementById('fxInput').value=fxRate.toFixed(2);
      localStorage.setItem(FX_KEY,fxRate.toString());
    }
  }
  let ok=0,fail=0;
  for(const s of stocks){
    const sym=market==='TW'?s.code+'.TW':s.code.toUpperCase();
    const p=await fetchOnePrice(sym);
    if(p){s.price=p;lastPrices[s.code]={price:p,time:Date.now()};ok++;}else fail++;
    await new Promise(r=>setTimeout(r,200));
  }
  saveMarket();
  const fxNote=market==='US'?`（USD/TWD ${fxRate.toFixed(2)}）`:'';
  setSyncStatus(ok>0?'ok':'err',ok>0?`已更新 ${ok} 檔${fail>0?'，'+fail+' 檔失敗':''}${fxNote}`:'所有來源無法連線，請稍後再試');
  document.getElementById('syncBtn').disabled=false;
  render();
  if(ok>0) saveSnapshot();
}
function setSyncStatus(s,msg){
  document.getElementById('syncDot').className='sync-dot '+(s==='loading'?'loading':s==='ok'?'ok':'err');
  document.getElementById('syncText').textContent=msg;
}

function enrich(src){
  return(src||stocks).map(s=>{
    const mv=s.shares*s.price;
    const cost=s.cost>0?s.cost:(s.shares*s.avg);
    const pnl=mv-cost, pct=cost>0?(pnl/cost*100):0;
    const mvTwd=market==='US'?mv*fxRate:mv;
    const pnlTwd=market==='US'?pnl*fxRate:pnl;
    return{...s,mv,cost,pnl,pct,mvTwd,pnlTwd};
  });
}
const fmtN=n=>Math.round(n).toLocaleString('zh-TW');
const fmtF=n=>parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const sgn=n=>n>=0?'+':'-';
const absF=n=>fmtF(Math.abs(n));
function fmtPri(v){return market==='TW'?fmtF(v):'$'+fmtF(v);}
function fmtMv(v){return market==='TW'?fmtN(v):'$'+fmtF(v);}
function fmtPnl(v){return(v>=0?'+':'-')+(market==='TW'?fmtN(Math.abs(v)):'$'+fmtF(Math.abs(v)));}
function fmtTwd(v){return(v>=0?'+':'-')+'NT$'+fmtN(Math.abs(v));}
function sdisplay(s){return market==='TW'?(s>=1000?(s%1000===0?(s/1000)+'張':(s/1000).toFixed(1)+'張'):s+'股'):s.toLocaleString()+'股';}
function priceAge(code){const p=lastPrices[code];if(!p)return'';const m=Math.floor((Date.now()-p.time)/60000);if(m<60)return`<span class="price-badge">${m}m前</span>`;if(m<1440)return`<span class="price-badge price-stale">${Math.floor(m/60)}h前</span>`;return`<span class="price-badge price-stale">${Math.floor(m/1440)}d前</span>`;}

  document.getElementById('pageContent').innerHTML=`

  const secPnls=topSec.map(([,v])=>parseFloat(v.pnl.toFixed(2)));

function renderHistContent(){

    document.getElementById('pageContent').innerHTML=`<div class="notice">📋 每次「⟳ 更新股價」成功後自動備份當日快照。</div><div style="color:var(--text3);font-size:12px;padding:8px;">尚無歷史記錄。</div>`;return;
  }
  const latest=hist[dates[0]],oldest=hist[dates[dates.length-1]];
  const pnlCh=latest.totalPnl-oldest.totalPnl,pc=pnlCh>=0?'up':'dn';
  const metrics=`
    <div class="metric"><div class="mlabel">記錄天數</div><div class="mval">${dates.length} 天</div></div>
    <div class="metric"><div class="mlabel">最新市值</div><div class="mval">${fmtMv(latest.totalMv)}</div></div>
    <div class="metric"><div class="mlabel">最新損益</div><div class="mval ${latest.totalPnl>=0?'up':'dn'}">${fmtPnl(latest.totalPnl)}</div></div>
    <div class="metric"><div class="mlabel">期間變化</div><div class="mval ${pc}">${fmtPnl(pnlCh)}</div></div>`;
  const cards=dates.map(d=>{const h=hist[d],c=h.totalPnl>=0?'up':'dn';return`<div class="hist-card${selHistDate===d?' active':''}"><div onclick="showHist('${d}')" style="cursor:pointer;"><div class="hist-date">${d}</div><div class="hist-mv">${fmtMv(h.totalMv)}</div><div class="hist-pnl ${c}">${fmtPnl(h.totalPnl)} (${sgn(h.totalCost>0?h.totalPnl/h.totalCost*100:0)}${absF(Math.abs(h.totalCost>0?h.totalPnl/h.totalCost*100:0))}%)</div>${h.fxRate&&market==='US'?`<div style="font-size:10px;color:var(--text3);margin-top:2px;">匯率 ${h.fxRate.toFixed(2)}</div>`:''}</div><div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;"><button class="btn" style="font-size:10px;padding:2px 7px;" onclick="event.stopPropagation();dlSnap('${d}','html')">🌐 網頁</button><button class="btn" style="font-size:10px;padding:2px 7px;" onclick="event.stopPropagation();dlSnap('${d}','csv')">📊 CSV</button><button class="btn" style="font-size:10px;padding:2px 7px;" onclick="event.stopPropagation();dlSnap('${d}','json')">{ } JSON</button></div></div>`;}).join('');

  document.getElementById('pageContent').innerHTML=`
    <div class="notice">📋 每次「⟳ 更新股價」成功後自動備份當日快照（每天一筆）。</div>
    <div class="metrics">${metrics}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div class="sec-title" style="margin:0;">歷史日期</div>
      <button class="btn" style="font-size:11px;" onclick="downloadAllSnaps()">⬇ 下載所有快照</button>
    </div>
    <div class="hist-grid">${cards}</div>
    <div id="histDetailArea"></div>`;

  if(selHistDate&&hist[selHistDate]) showHist(selHistDate,true);
}
function showHist(date,noRe){
  selHistDate=date;const hist=getHistory(),h=hist[date];if(!h)return;
  const snapFx=h.fxRate||fxRate;
  const data=h.stocks.map(s=>{const mv=s.shares*s.price,cost=s.cost>0?s.cost:(s.shares*s.avg),pnl=mv-cost,pct=cost>0?(pnl/cost*100):0;return{...s,mv,cost,pnl,pct};});
  const sorted=[...data].sort((a,b)=>b.pnl-a.pnl);
  const rows=sorted.map((s,i)=>{const c=s.pnl>=0?'up':'dn',bg=i%2===0?'var(--bg2)':'var(--bg)';
    const nc=market==='TW'?`<div class="sname">${s.name}</div><div class="scode">${s.code}</div>`:`<div class="sname">${s.code}</div><div class="scode">${s.name}</div>`;
    const vals=market==='TW'
      ?`<td style="text-align:right;font-size:12px;">${sdisplay(s.shares)}</td><td style="text-align:right;font-size:12px;">${fmtF(s.price)}</td><td style="text-align:right;font-size:12px;">${fmtN(s.mv)}</td><td style="text-align:right;font-size:12px;">${fmtN(s.cost)}</td><td style="text-align:right;font-size:12px;" class="${c}">${fmtPnl(s.pnl)}</td><td style="text-align:right;font-size:12px;" class="${c}">${sgn(s.pct)}${absF(s.pct)}%</td>`
      :`<td style="text-align:right;font-size:12px;">${sdisplay(s.shares)}</td><td style="text-align:right;font-size:12px;">$${fmtF(s.price)}</td><td style="text-align:right;font-size:12px;">$${fmtF(s.mv)}</td><td style="text-align:right;font-size:12px;">$${fmtF(s.cost)}</td><td style="text-align:right;font-size:12px;" class="${c}">${fmtPnl(s.pnl)}</td><td style="text-align:right;font-size:12px;" class="${c}">${fmtTwd(s.pnl*snapFx)}</td><td style="text-align:right;font-size:12px;" class="${c}">${sgn(s.pct)}${absF(s.pct)}%</td>`;
    return`<tr style="background:${bg};border-bottom:1px solid var(--border);"><td style="padding:6px 7px;text-align:left;">${nc}</td>${vals}</tr>`;}).join('');

  const thCols=market==='TW'?['存股數','市價','市值','成本','損益','損益%']:['股數','市價(USD)','市值(USD)','成本(USD)','損益(USD)','損益(TWD)','損益%'];
  const ths=thCols.map(h=>`<th style="padding:6px 7px;text-align:right;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);">${h}</th>`).join('');

  const area=document.getElementById('histDetailArea');
  if(area) area.innerHTML=`<div class="hist-detail"><div style="font-weight:600;margin-bottom:8px;color:var(--acc);">📅 ${date} 快照${market==='US'?'（匯率 '+snapFx.toFixed(2)+'）':''}</div><div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr style="background:var(--bg3);"><th style="padding:6px 7px;text-align:left;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);">商品</th>${ths}</tr></thead><tbody>${rows}</tbody></table></div><div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:flex-end;"><span style="font-size:11px;color:var(--text3);margin-right:4px;">下載：</span><button class="btn prim" style="font-size:11px;" onclick="dlSnap('${date}','html')">🌐 HTML報表</button><button class="btn" style="font-size:11px;" onclick="dlSnap('${date}','csv')">📊 CSV試算表</button><button class="btn" style="font-size:11px;" onclick="dlSnap('${date}','json')">{ } JSON</button><button class="btn" style="font-size:11px;color:#d93025;border-color:#d93025;margin-left:8px;" onclick="delSnap('${date}')">🗑 刪除</button></div></div>`;
  if(!noRe) renderHistContent();
}
function delSnap(date){if(!confirm('確定刪除 '+date+'？'))return;const h=getHistory();delete h[date];saveHistory(h);selHistDate=null;renderHistContent();}

// ── 下載單日快照（JSON / CSV / HTML）─────────────────────────────
function dlSnap(date,fmt){
  const hist=getHistory(),h=hist[date];if(!h)return;
  const isTW=market==='TW';
  const snapFx=h.fxRate||fxRate;
  const data=h.stocks.map(s=>{
    const mv=s.shares*s.price,cost=s.cost>0?s.cost:(s.shares*s.avg);
    const pnl=mv-cost,pct=cost>0?(pnl/cost*100):0;
    return{...s,mv,cost,pnl,pct};
  }).sort((a,b)=>b.pnl-a.pnl);

  const fn=(market==='TW'?'台股':'美股')+'快照_'+date;

  if(fmt==='json'){
    dl(fn+'.json', JSON.stringify({date,market,...h},null,2), 'application/json');

  } else if(fmt==='csv'){
    const hdr=isTW
      ?['日期','代碼','名稱','存股數','市價','市值','投入成本','投資損益','報酬率%']
      :['日期','代碼','名稱','股數','市價(USD)','市值(USD)','投入成本(USD)','損益(USD)','損益(TWD)','報酬率%'];
    const rows=[hdr.join(',')];
    data.forEach(s=>{
      const row=isTW
        ?[date,s.code,s.name,s.shares,fmtF(s.price),Math.round(s.mv),Math.round(s.cost),Math.round(s.pnl),fmtF(s.pct)+'%']
        :[date,s.code,s.name,s.shares,fmtF(s.price),fmtF(s.mv),fmtF(s.cost),fmtF(s.pnl),fmtF(s.pnl*snapFx),fmtF(s.pct)+'%'];
      rows.push(row.join(','));
    });
    rows.push('');
    rows.push(isTW
      ?['','','合計','','' ,Math.round(h.totalMv),Math.round(h.totalCost),Math.round(h.totalPnl),fmtF(h.totalCost>0?h.totalPnl/h.totalCost*100:0)+'%'].join(',')
      :['','','合計','','',fmtF(h.totalMv),fmtF(h.totalCost),fmtF(h.totalPnl),fmtF(h.totalPnl*snapFx),fmtF(h.totalCost>0?h.totalPnl/h.totalCost*100:0)+'%'].join(',')
    );
    dl(fn+'.csv', '\ufeff'+rows.join('\n'), 'text/csv;charset=utf-8;');

  } else if(fmt==='html'){
    const totPct=h.totalCost>0?(h.totalPnl/h.totalCost*100):0;
    const colUp='#c0392b', colDn='#1a7a4a', colHead='#1a6b6b';

        ?`<td>${sdisplay(s.shares)}</td><td>${fmtF(s.price)}</td><td>${Math.round(s.mv).toLocaleString()}</td><td>${Math.round(s.cost).toLocaleString()}</td><td style="color:${c};font-weight:600;">${s.pnl>=0?'+':''}${Math.round(s.pnl).toLocaleString()}</td><td style="color:${c};font-weight:600;">${s.pnl>=0?'+':''}${fmtF(s.pct)}%</td>`
        :`<td>${s.shares.toLocaleString()}</td><td>$${fmtF(s.price)}</td><td>$${fmtF(s.mv)}</td><td>$${fmtF(s.cost)}</td><td style="color:${c};font-weight:600;">${s.pnl>=0?'+':''}$${fmtF(Math.abs(s.pnl))}</td><td style="color:${c};font-weight:600;">NT$${Math.round(s.pnl*snapFx).toLocaleString()}</td><td style="color:${c};font-weight:600;">${s.pnl>=0?'+':''}${fmtF(s.pct)}%</td>`;
      return`<tr style="background:${bg};"><td style="text-align:left;"><strong>${s.name}</strong><br><small style="color:#888;">${s.code}</small></td>${cells}</tr>`;
    }).join('');
    const thCols=isTW
      ?['商品','股數','市價','市值','投入成本','投資損益','報酬率']
      :['商品','股數','市價(USD)','市值(USD)','成本(USD)','損益(USD)','損益(TWD)','報酬率'];
    const ths=thCols.map(t=>`<th>${t}</th>`).join('');

  <div class="footer">產生時間：${new Date().toLocaleString('zh-TW')}</div>
</div>
</body></html>`;
    dl(fn+'.html', html, 'text/html;charset=utf-8;');
  }
}

// ── 下載所有快照 CSV ────────────────────────────────────────────
function downloadAllSnaps(){
  const hist=getHistory();
  if(!Object.keys(hist).length){alert('尚無快照資料');return;}
  const isTW=market==='TW';
  const dates=Object.keys(hist).sort();
  const hdr=isTW
    ?['日期','代碼','名稱','存股數','市價','市值','投入成本','投資損益','報酬率%']
    :['日期','代碼','名稱','股數','市價(USD)','市值(USD)','投入成本(USD)','損益(USD)','報酬率%'];
  const rows=[hdr.join(',')];
  dates.forEach(date=>{
    const h=hist[date];
    (h.stocks||[]).forEach(s=>{
      const mv=s.shares*s.price,cost=s.cost>0?s.cost:(s.shares*s.avg),pnl=mv-cost,pct=cost>0?(pnl/cost*100):0;
      const row=isTW
        ?[date,s.code,s.name,s.shares,fmtF(s.price),Math.round(mv),Math.round(cost),Math.round(pnl),fmtF(pct)+'%']
        :[date,s.code,s.name,s.shares,fmtF(s.price),fmtF(mv),fmtF(cost),fmtF(pnl),fmtF(pct)+'%'];
      rows.push(row.join(','));
    });
    rows.push('');
  });
  dl((isTW?'台股':'美股')+'所有快照_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.csv','\ufeff'+rows.join('\n'),'text/csv;charset=utf-8;');
}

function dl(filename,content,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename;a.click();
}

// 從 GH Pages 上的 holdings.json 拉清單到 localStorage
async function pullCentral(){
  try{
    const r = await fetch('./holdings.json?cb=' + Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const twNew = d.tw || [], usNew = d.us || [];
    const ts = d.updated_at ? new Date(d.updated_at).toLocaleString('zh-TW') : '未知';
    const ok = confirm(
      `從中央載入持股清單？\n\n` +
      `🇹🇼 台股：${twNew.length} 檔（${twNew.map(s=>s.code).join(', ')}）\n` +
      `🇺🇸 美股：${usNew.length} 檔\n\n` +
      `更新時間：${ts}\n` +
      `來源：${d.update_source || '手動'}\n\n` +
      `會合併到本機：保留你的股數/成本/均價，只更新清單組成與名稱。`
    );
    if(!ok) return;
    mergeCentral('TW', twNew, d.prices||{});
    mergeCentral('US', usNew, d.prices||{});
    alert(`✅ 已同步\n台股 ${twNew.length} 檔、美股 ${usNew.length} 檔`);
    location.reload();
  }catch(e){
    alert('❌ 同步失敗：' + e.message + '\n\nholdings.json 是否已部署？跑 python3 ~/StockHoldingsDaily/update_daily.py');
  }
}

// 合併：保留 localStorage 內 shares/price/avg/cost/be，只覆寫名稱與清單組成
function mergeCentral(mkt, list, prices){
  const k = mkt === 'TW' ? 'twStocks' : 'usStocks';
  const defaults = mkt === 'TW' ? TW_DEFAULTS : US_DEFAULTS;
  let cur = [];
  try{ cur = JSON.parse(localStorage.getItem(k)) || []; }catch{}
  const byCode = Object.fromEntries(cur.map(s => [s.code, s]));
  const defByCode = Object.fromEntries(defaults.map(s => [s.code, s]));
  const merged = list.map(s => {
    const exist = byCode[s.code];
    if(exist) return {...exist, name: s.name};
    // 新檔：用 hardcoded 預設帶 shares/cost，沒有就空殼
    const def = defByCode[s.code];
    if(def) return {...def, name: s.name};
    const p = prices[s.code] || {};
    return {code: s.code, name: s.name, shares: 0, price: p.price || 0, avg: 0, cost: 0, be: 0, sector: '其他'};
  });
  localStorage.setItem(k, JSON.stringify(merged));
}

// 把當前 localStorage 持股清單下載成 .stocks_holdings.json
async function pushCentral(){
  // 先讀線上中央檔當 base（保留 _comment / refreshSec / window* 等 metadata）
  let base = {};
  try{
    const r = await fetch('./holdings.json?cb=' + Date.now(), {cache:'no-store'});
    if(r.ok) base = await r.json();
  }catch{}
  let tw=[], us=[];
  try{ tw = JSON.parse(localStorage.getItem('twStocks')) || []; }catch{}
  try{ us = JSON.parse(localStorage.getItem('usStocks')) || []; }catch{}

    _comment: base._comment || '中央持倉清單 — 從損益追蹤器匯出',
    tw: tw.map(s => ({code: s.code, name: s.name})),
    us: us.map(s => ({code: s.code, name: s.name})),
    refreshSec: base.refreshSec ?? 30,
    windowWidth: base.windowWidth ?? 1147,
    windowHeight: base.windowHeight ?? 642,
    exported_from: 'index.html (損益追蹤器)',
    exported_at: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stocks_holdings.json';
  a.click();

  );
}

// 即時更新引擎
// ════════════════════════════════════════════════════════════════
let liveTimer=null, cdTimer=null, liveInterval=30, liveRunning=false, cdRemain=0;
let prevPrices={};  // 記錄上次價格，用於閃爍效果

// 台股開盤：週一~五 09:00~13:30 (台灣時間 UTC+8)
// 美股開盤：週一~五 22:30~05:00 次日 (台灣時間)
function isMarketOpen(){
  const now=new Date();
  const day=now.getDay(); // 0=日,6=六
  if(day===0||day===6) return false;
  const h=now.getHours(), m=now.getMinutes(), tot=h*60+m;
  if(market==='TW') return tot>=9*60 && tot<=13*60+30;
  if(market==='US') return tot>=22*60+30 || tot<=5*60; // 跨午夜
  return false;
}
function marketStatusText(){
  const open=isMarketOpen();
  const day=new Date().getDay();
  if(day===0||day===6) return{open:false,text:'週末休市'};
  if(market==='TW') return open?{open:true,text:'台股開盤中 09:00–13:30'}:{open:false,text:'台股休市（開盤：週一~五 09:00–13:30）'};
  return open?{open:true,text:'美股開盤中 22:30–05:00(台灣時)'}:{open:false,text:'美股休市（開盤：週一~五 22:30–05:00台灣時）'};
}

function setIvl(sec){
  liveInterval=sec;
  document.querySelectorAll('.ivl-btn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===sec||(sec===60&&b.textContent==='1分')||(sec===300&&b.textContent==='5分')));
  if(liveRunning){stopLive();startLive();}
}

function toggleLive(){
  if(liveRunning) stopLive(); else startLive();
}

function startLive(){
  liveRunning=true;
  document.getElementById('liveToggle').textContent='⏹ 停止';
  updateLiveUI();
  doLiveFetch();
}
function stopLive(){
  liveRunning=false;
  clearTimeout(liveTimer); clearInterval(cdTimer);
  liveTimer=null; cdTimer=null;
  document.getElementById('liveToggle').textContent='▶ 啟動';
  document.getElementById('liveDot').className='live-dot closed';
  document.getElementById('liveCd').textContent='';
  document.getElementById('liveInfo').textContent='已停止自動更新';
  document.getElementById('liveLabel').textContent='即時更新';
}

async function doLiveFetch(){
  if(!liveRunning) return;
  updateLiveUI();
  await fetchPricesQuiet(); // 靜默抓取，不顯示 sync-bar
  startCountdown();
}

function startCountdown(){
  clearInterval(cdTimer);
  cdRemain=liveInterval;
  cdTimer=setInterval(()=>{
    cdRemain--;
    document.getElementById('liveCd').textContent=cdRemain+'s';
    if(cdRemain<=0){
      clearInterval(cdTimer);
      if(liveRunning) doLiveFetch();
    }
  },1000);
}

function updateLiveUI(){
  const st=marketStatusText();
  const dot=document.getElementById('liveDot');
  dot.className='live-dot '+(liveRunning?(st.open?'on':'paused'):'closed');
  document.getElementById('liveLabel').textContent=liveRunning?(st.open?'🔴 即時更新中':'⏸ 休市中待機'):'即時更新';
  document.getElementById('liveInfo').textContent=st.text+(liveRunning?' · 每'+liveInterval+'秒更新':'');
}

// 靜默版抓取（不動 syncBar，但更新價格與畫面）
async function fetchPricesQuiet(){
  if(!stocks.length) return;
  // 只在開盤或強制模式下抓
  const open=isMarketOpen();
  if(!open){
    // 休市時降低頻率：每5分鐘才真的抓一次
    if(cdRemain>0&&liveInterval<300) return;
  }
  // 更新匯率（美股）
  if(market==='US'){
    const newFx=await fetchFxRate();
    if(newFx&&newFx!==fxRate){
      fxRate=newFx;
      document.getElementById('fxInput').value=fxRate.toFixed(2);
      localStorage.setItem(FX_KEY,fxRate.toString());
    }
  }
  let ok=0;
  for(const s of stocks){
    const sym=market==='TW'?s.code+'.TW':s.code.toUpperCase();
    const p=await fetchOnePrice(sym);
    if(p&&p>0){
      // 閃爍效果
      if(prevPrices[s.code]!==undefined&&p!==prevPrices[s.code]){
        flashPrice(s.code, p>prevPrices[s.code]);
      }
      prevPrices[s.code]=s.price;
      s.price=p;
      lastPrices[s.code]={price:p,time:Date.now()};
      ok++;
    }
    await new Promise(r=>setTimeout(r,150));
  }
  if(ok>0){
    saveMarket();
    render();
    document.getElementById('ts').textContent='即時更新：'+new Date().toLocaleTimeString('zh-TW');
  }
  updateLiveUI();
}

function flashPrice(code, isUp){
  // 找到所有含此 code 的 tr 並觸發閃爍
  document.querySelectorAll(`tr[data-code="${code}"]`).forEach(row=>{
    row.classList.remove('price-flash-up','price-flash-dn');
    void row.offsetWidth; // reflow
    row.classList.add(isUp?'price-flash-up':'price-flash-dn');
    setTimeout(()=>row.classList.remove('price-flash-up','price-flash-dn'),700);
  });
}

window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    if(isMarketOpen()) startLive();
    else updateLiveUI();
  },1500);
});

loadMarket();
renderTabs();
render();

  var byCat = {}, catOrder = [];
  TOOLS.forEach(function(t){ if (!byCat[t.cat]) { byCat[t.cat] = []; catOrder.push(t.cat); } byCat[t.cat].push(t); });
  var html = '<div class="vip-nav-title">🧭 川普投顧 VIP 工具箱<button class="vip-nav-close" aria-label="關閉">×</button></div>';
  html += '<div class="vip-nav-sub">王川銘 — 一鍵切換所有工具</div>';
  catOrder.forEach(function(cat){
    html += '<div class="vip-nav-cat">'+cat+'</div><div class="vip-nav-grid">';
    byCat[cat].forEach(function(t){
      var cls = 'vip-nav-item' + (t.name === current ? ' current' : '');
      html += '<a class="'+cls+'" href="'+base+t.file+'"><div class="vip-nav-emoji">'+t.emoji+'</div><div>'+t.name+'</div></a>';
    });
    html += '</div>';
  });
  panel.innerHTML = html;
  function attach(){
    document.body.appendChild(btn);
    document.body.appendChild(mask);
    document.body.appendChild(panel);
    btn.addEventListener('click', function(){ mask.classList.add('show'); panel.classList.add('show'); });
    mask.addEventListener('click', function(){ mask.classList.remove('show'); panel.classList.remove('show'); });
    panel.querySelector('.vip-nav-close').addEventListener('click', function(){ mask.classList.remove('show'); panel.classList.remove('show'); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') { mask.classList.remove('show'); panel.classList.remove('show'); } });
  }
  if (document.body) attach(); else document.addEventListener('DOMContentLoaded', attach);
})();
</script>
<!-- VIP-NAV-END -->
</body>
</html>
