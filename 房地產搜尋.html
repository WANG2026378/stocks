<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理想房屋與農地搜尋 · 川普投顧 VIP</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#0f1623;--border:#1e2d40;--text:#e0e6f0;--muted:#6b7280;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;--orange:#fb923c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:60px}

.header{background:linear-gradient(135deg,#060912 0%,#0d1520 100%);border-bottom:1px solid var(--border);padding:28px 20px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(251,146,60,.12) 0%,transparent 70%);pointer-events:none}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(251,146,60,.15);border:1px solid rgba(251,146,60,.3);border-radius:20px;padding:4px 14px;font-size:12px;color:#fdba74;margin-bottom:14px}
.header-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-1px}
.header-title span{background:linear-gradient(90deg,#fb923c,#f59e0b,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:14px;color:var(--muted)}

.main{max-width:1100px;margin:0 auto;padding:24px 16px}

.step{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.step-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.step-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#fb923c,#f59e0b);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.step-title{font-size:16px;font-weight:700}
.step-hint{font-size:12px;color:var(--muted);margin-left:auto}

.btn-row{display:flex;flex-wrap:wrap;gap:8px}
.btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500;white-space:nowrap}
.btn:hover{border-color:#fb923c;background:rgba(251,146,60,.08)}
.btn.active{background:linear-gradient(135deg,#fb923c,#f59e0b);border-color:#fb923c;color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(251,146,60,.3)}
.btn-icon{margin-right:4px}
.btn-sub{font-size:11px;opacity:.7;display:block;margin-top:2px;font-weight:400}

.actions{display:flex;gap:10px;justify-content:center;margin:20px 0 8px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,#10b981,#059669);border:none;color:#fff;padding:14px 32px;font-size:16px;font-weight:700;border-radius:12px;cursor:pointer;transition:all .2s;font-family:inherit;box-shadow:0 4px 16px rgba(16,185,129,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(16,185,129,.4)}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--muted);padding:14px 24px;font-size:14px;border-radius:12px;cursor:pointer;font-family:inherit}
.btn-reset:hover{border-color:var(--red);color:var(--red)}

.results{display:none;margin-top:24px}
.results.show{display:block}
.result-summary{background:linear-gradient(135deg,rgba(251,146,60,.12),rgba(16,185,129,.08));border:1px solid rgba(251,146,60,.3);border-radius:14px;padding:18px;margin-bottom:18px}
.result-summary h3{font-size:16px;margin-bottom:8px;color:#fdba74}
.result-summary p{font-size:13px;color:var(--muted);line-height:1.7}

.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.r-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;transition:all .2s}
.r-card:hover{border-color:#fb923c;transform:translateY(-2px)}
.r-card.top1{border-color:#f59e0b;background:linear-gradient(135deg,rgba(245,158,11,.08),var(--card))}
.r-card.top1::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#fb923c,#f59e0b)}
.r-rank{position:absolute;top:14px;right:14px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--muted);font-weight:700}
.r-card.top1 .r-rank{background:linear-gradient(135deg,#fb923c,#f59e0b);border-color:#fb923c;color:#fff}
.r-loc{font-size:18px;font-weight:800;margin-bottom:2px}
.r-area{font-size:12px;color:var(--muted);margin-bottom:12px}
.r-score{display:flex;align-items:baseline;gap:6px;margin-bottom:12px}
.r-score-val{font-size:32px;font-weight:800;background:linear-gradient(90deg,#fb923c,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.r-score-lbl{font-size:11px;color:var(--muted)}

.r-bars{margin-bottom:12px}
.r-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.r-bar-lbl{width:60px;color:var(--muted);flex-shrink:0}
.r-bar-track{flex:1;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.r-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.r-bar-val{width:32px;text-align:right;color:var(--text);font-weight:600}

.r-info{font-size:12px;color:var(--muted);line-height:1.6;padding:10px;background:var(--card2);border-radius:8px;margin-bottom:10px}
.r-info strong{color:#fdba74}

.r-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.r-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
.r-tag.g{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.2)}
.r-tag.y{background:rgba(245,158,11,.12);color:#fcd34d;border-color:rgba(245,158,11,.2)}
.r-tag.p{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:rgba(139,92,246,.2)}
.r-tag.r{background:rgba(239,68,68,.12);color:#fca5a5;border-color:rgba(239,68,68,.2)}

.r-links{border-top:1px dashed var(--border);padding-top:10px;margin-top:4px}
.r-links-title{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;font-weight:600}
.r-link-row{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.r-link{display:flex;align-items:center;justify-content:center;gap:4px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 6px;font-size:11px;color:var(--text);text-decoration:none;transition:all .15s;font-weight:600}
.r-link:hover{transform:translateY(-1px)}
.r-link.s591{border-color:rgba(239,68,68,.3);color:#fca5a5}
.r-link.s591:hover{background:rgba(239,68,68,.12);border-color:#ef4444}
.r-link.sinyi{border-color:rgba(59,130,246,.3);color:#93c5fd}
.r-link.sinyi:hover{background:rgba(59,130,246,.12);border-color:#3b82f6}
.r-link.yung{border-color:rgba(16,185,129,.3);color:#6ee7b7}
.r-link.yung:hover{background:rgba(16,185,129,.12);border-color:#10b981}
.r-link.gov{border-color:rgba(245,158,11,.3);color:#fcd34d}
.r-link.gov:hover{background:rgba(245,158,11,.12);border-color:#f59e0b}
.r-link.farm{border-color:rgba(139,92,246,.3);color:#c4b5fd}
.r-link.farm:hover{background:rgba(139,92,246,.12);border-color:#8b5cf6}
.r-link.google{border-color:rgba(251,146,60,.3);color:#fdba74}
.r-link.google:hover{background:rgba(251,146,60,.12);border-color:#fb923c}

.r-fetch-btn{width:100%;margin-top:10px;background:linear-gradient(135deg,#10b981,#059669);border:none;color:#fff;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.r-fetch-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,.3)}
.r-fetch-btn:disabled{opacity:.6;cursor:wait}
.r-fetch-panel{display:none;margin-top:10px;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;max-height:400px;overflow-y:auto}
.r-fetch-panel.show{display:block}
.fetch-status{font-size:12px;color:var(--muted);text-align:center;padding:14px}
.fetch-empty{font-size:12px;color:#fcd34d;text-align:center;padding:10px;line-height:1.7}
.fetch-go{display:inline-block;margin-top:8px;color:#fb923c;text-decoration:none;font-weight:700;padding:6px 12px;border:1px solid rgba(251,146,60,.4);border-radius:6px}
.fetch-go:hover{background:rgba(251,146,60,.12)}
.fetch-list-title{font-size:11px;color:#6ee7b7;margin-bottom:8px;font-weight:700;letter-spacing:.5px}
.fetch-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;transition:all .15s}
.fetch-item:hover{border-color:#10b981}
.fi-type{font-size:10px;background:rgba(16,185,129,.15);color:#6ee7b7;padding:2px 6px;border-radius:4px;font-weight:700;flex-shrink:0}
.fi-info{flex:1;min-width:0}
.fi-title{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.fi-price{font-size:13px;color:#fb923c;font-weight:700}
.fi-link{color:#60a5fa;font-size:18px;text-decoration:none;flex-shrink:0;padding:0 4px}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px;font-size:12px;color:#fcd34d;margin-top:16px;line-height:1.6}

@media(max-width:600px){
  .header-title{font-size:22px}
  .btn{padding:8px 12px;font-size:13px}
  .step{padding:16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">🏡 川普投顧 VIP · 房地產智能搜尋</div>
  <div class="header-title">理想房屋與<span>農地搜尋</span></div>
  <div class="header-sub">按需求按鈕 · 智能推薦增值潛力地區 · 全台農地與住宅</div>
</div>

<div class="main">

  <!-- Step 1: 用途 -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">1</div>
      <div class="step-title">主要用途</div>
      <div class="step-hint">單選</div>
    </div>
    <div class="btn-row" data-group="purpose" data-single="1">
      <button class="btn" data-v="自住">🏠 自住房屋<span class="btn-sub">蓋自宅或購屋居住</span></button>
      <button class="btn" data-v="農耕">🌾 農地耕作<span class="btn-sub">種菜種樹自耕</span></button>
      <button class="btn" data-v="休閒">🏕️ 休閒農場<span class="btn-sub">假日露營度假</span></button>
      <button class="btn" data-v="投資">💰 投資增值<span class="btn-sub">長期持有等增值</span></button>
      <button class="btn" data-v="退休">🌅 退休養老<span class="btn-sub">山林水邊慢活</span></button>
    </div>
  </div>

  <!-- Step 2: 地區 -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">2</div>
      <div class="step-title">偏好地區</div>
      <div class="step-hint">可多選 · 不選=全台</div>
    </div>
    <div class="btn-row" data-group="region">
      <button class="btn" data-v="北北基">🏙️ 雙北基隆</button>
      <button class="btn" data-v="桃竹苗">🌆 桃竹苗</button>
      <button class="btn" data-v="中彰投">🏞️ 中彰投</button>
      <button class="btn" data-v="雲嘉南">🌾 雲嘉南</button>
      <button class="btn" data-v="高屏">🌴 高屏</button>
      <button class="btn" data-v="宜花東">🏔️ 宜花東</button>
    </div>
  </div>

  <!-- Step 3: 預算 -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">3</div>
      <div class="step-title">預算範圍</div>
      <div class="step-hint">單選</div>
    </div>
    <div class="btn-row" data-group="budget" data-single="1">
      <button class="btn" data-v="300">💵 300萬以下</button>
      <button class="btn" data-v="500">💵 300-500萬</button>
      <button class="btn" data-v="800">💴 500-800萬</button>
      <button class="btn" data-v="1500">💴 800-1500萬</button>
      <button class="btn" data-v="3000">💰 1500-3000萬</button>
      <button class="btn" data-v="9999">💎 3000萬以上</button>
    </div>
  </div>

  <!-- Step 4: 面積 -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">4</div>
      <div class="step-title">面積需求</div>
      <div class="step-hint">單選</div>
    </div>
    <div class="btn-row" data-group="size" data-single="1">
      <button class="btn" data-v="小">🏠 小坪數<span class="btn-sub">30坪以下</span></button>
      <button class="btn" data-v="中">🏡 中坪數<span class="btn-sub">30-60坪</span></button>
      <button class="btn" data-v="大">🏘️ 大坪數<span class="btn-sub">60坪以上</span></button>
      <button class="btn" data-v="農小">🌱 小農地<span class="btn-sub">1分地以下</span></button>
      <button class="btn" data-v="農中">🌾 中農地<span class="btn-sub">1-3分地</span></button>
      <button class="btn" data-v="農大">🚜 大農地<span class="btn-sub">3分地以上</span></button>
    </div>
  </div>

  <!-- Step 5: 加分條件 -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">5</div>
      <div class="step-title">加分條件</div>
      <div class="step-hint">可多選</div>
    </div>
    <div class="btn-row" data-group="bonus">
      <button class="btn" data-v="捷運">🚇 捷運/高鐵近</button>
      <button class="btn" data-v="重劃">🏗️ 重劃區</button>
      <button class="btn" data-v="學區">🎓 明星學區</button>
      <button class="btn" data-v="醫療">🏥 醫療資源</button>
      <button class="btn" data-v="水源">💧 自然水源</button>
      <button class="btn" data-v="聯外">🛣️ 聯外道路</button>
      <button class="btn" data-v="景觀">🏞️ 山景/海景</button>
      <button class="btn" data-v="人口">📈 人口成長</button>
      <button class="btn" data-v="科技">💻 科技園區近</button>
      <button class="btn" data-v="觀光">🎡 觀光熱區</button>
    </div>
  </div>

  <!-- Step 6: 個人條件 -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">6</div>
      <div class="step-title">個人條件</div>
      <div class="step-hint">可多選</div>
    </div>
    <div class="btn-row" data-group="personal">
      <button class="btn" data-v="自耕農">👨‍🌾 具自耕農身分<span class="btn-sub">可購農牧用地</span></button>
      <button class="btn" data-v="通勤北">🚗 需通勤台北</button>
      <button class="btn" data-v="長期">⏳ 長期持有10年+</button>
      <button class="btn" data-v="短期">⚡ 短期5年內</button>
      <button class="btn" data-v="貸款">🏦 需貸款</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="search()">🔍 智能推薦</button>
    <button class="btn-reset" onclick="resetAll()">🔄 重新選擇</button>
  </div>

  <div class="results" id="results">
    <div class="result-summary" id="summary"></div>
    <div class="result-grid" id="grid"></div>
  </div>

  <div class="warn">
    ⚠️ 提醒：本工具為策略推薦參考，實際購買前請至內政部實價登錄 (lvr.land.moi.gov.tw) 查詢真實成交價，並至地政事務所確認地目、使用分區與管制。農牧用地需具自然人且符合農發條例規定方可購買。
  </div>

</div>

const REGION_LABEL={北北基:'雙北基隆',桃竹苗:'桃竹苗',中彰投:'中彰投',雲嘉南:'雲嘉南',高屏:'高屏',宜花東:'宜花東'};

const state = {purpose:'',region:[],budget:'',size:'',bonus:[],personal:[]};

// 按鈕點擊事件
document.querySelectorAll('.btn-row').forEach(row=>{
  const group = row.dataset.group;
  const single = row.dataset.single === '1';
  row.querySelectorAll('.btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const v = btn.dataset.v;
      if(single){
        row.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        state[group] = v;
      } else {
        btn.classList.toggle('active');
        if(btn.classList.contains('active')){
          if(!state[group].includes(v)) state[group].push(v);
        } else {
          state[group] = state[group].filter(x=>x!==v);
        }
      }
    });
  });
});

function resetAll(){
  document.querySelectorAll('.btn.active').forEach(b=>b.classList.remove('active'));
  state.purpose=''; state.region=[]; state.budget=''; state.size=''; state.bonus=[]; state.personal=[];
  document.getElementById('results').classList.remove('show');
}

function search(){
  if(!state.purpose){ alert('請先選擇主要用途'); return; }

  const budgetMax = state.budget ? parseInt(state.budget) : 9999;
  const isAgri = ['農耕','休閒','退休'].includes(state.purpose) || (state.size||'').startsWith('農');

  const scored = DATA.map(d=>{
    let score = d.scores[state.purpose] || 50;

    // 預算過濾
    const refPrice = isAgri ? d.price.地*30 : d.price.房*15; // 粗估總價（萬）
    let budgetFit = 1;
    if(refPrice > budgetMax * 1.5){ budgetFit = 0.3; score -= 25; }
    else if(refPrice > budgetMax){ budgetFit = 0.6; score -= 10; }
    else if(refPrice < budgetMax * 0.3){ budgetFit = 0.9; score += 3; }
    else { score += 8; }

    // 地區符合
    if(state.region.length>0 && !state.region.includes(d.region)){
      score -= 15;
    } else if(state.region.includes(d.region)){
      score += 5;
    }

    // 面積符合
    if(state.size && !d.size.includes(state.size)){
      score -= 8;
    }

    // 加分條件
    const bonusHit = state.bonus.filter(b=>d.bonus.includes(b)).length;
    score += bonusHit * 4;

    // 個人條件
    if(state.personal.includes('通勤北') && !['北北基','桃竹苗'].includes(d.region)) score -= 12;
    if(state.personal.includes('通勤北') && d.region==='宜花東' && d.loc.includes('宜蘭')) score += 5; // 雪隧
    if(state.personal.includes('短期') && d.scores.投資 < 70) score -= 8;
    if(state.personal.includes('長期') && d.scores.投資 >= 75) score += 5;
    if(state.personal.includes('自耕農') && d.size.some(s=>s.startsWith('農'))) score += 6;
    if(!state.personal.includes('自耕農') && isAgri) score -= 5; // 提醒沒身分不能買農牧用地

    score = Math.max(0,Math.min(100,Math.round(score)));
    return {...d,score,bonusHit,refPrice};
  });

  // 排序取前9
  scored.sort((a,b)=>b.score-a.score);
  const top = scored.slice(0,9);

  renderResults(top, isAgri);
}

            <div class="r-bar"><div class="r-bar-lbl">自住性</div><div class="r-bar-track"><div class="r-bar-fill" style="width:${scoreLive}%;background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div></div><div class="r-bar-val">${scoreLive}</div></div>
            <div class="r-bar"><div class="r-bar-lbl">農耕性</div><div class="r-bar-track"><div class="r-bar-fill" style="width:${scoreFarm}%;background:linear-gradient(90deg,#10b981,#34d399)"></div></div><div class="r-bar-val">${scoreFarm}</div></div>
            <div class="r-bar"><div class="r-bar-lbl">休閒性</div><div class="r-bar-track"><div class="r-bar-fill" style="width:${scoreLeisure}%;background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div><div class="r-bar-val">${scoreLeisure}</div></div>
            <div class="r-bar"><div class="r-bar-lbl">增值力</div><div class="r-bar-track"><div class="r-bar-fill" style="width:${scoreInvest}%;background:linear-gradient(90deg,#fb923c,#f59e0b)"></div></div><div class="r-bar-val">${scoreInvest}</div></div>
          </div>
          <div class="r-info">
            💰 房價約 <strong>${d.price.房}萬/坪</strong> · 農地約 <strong>${d.price.地}萬/坪</strong><br>
            📊 ${d.desc}
          </div>
          <div class="r-tags">${tags}</div>
          <div class="r-links">
            <div class="r-links-title">🔗 查看現有出售物件</div>
            ${links}
            <button class="r-fetch-btn" onclick="openAllSearch('${d.loc}','${d.area}',${isAgri?'true':'false'},this)">🚀 一鍵開啟全網現售搜尋</button>
            <div class="r-fetch-panel"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('results').classList.add('show');
  setTimeout(()=>{
    document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

// 一鍵打開多個搜尋分頁（取代無法 work 的 CORS 抓取）
// 591 是 SPA + CORS 阻擋，無法可靠抓資料回本頁；改用瀏覽器分頁開啟多個來源讓使用者直接比對
function openAllSearch(loc, area, isAgri, btn){
  const enc = encodeURIComponent;
  const panel = btn.closest('.r-card').querySelector('.r-fetch-panel');
  const targets = isAgri ? [
    {name:'591 土地', url:`https://sale.591.com.tw/?type=2&kw=${enc(loc)}`, tag:'核心'},
    {name:'Google 農地出售', url:`https://www.google.com/search?q=${enc(loc)}+農地+出售`, tag:'全網'},
    {name:'Google 地圖', url:`https://www.google.com/maps/search/?api=1&query=${enc(area+' '+loc)}`, tag:'地理'},
    {name:'樂屋/好房', url:`https://www.google.com/search?q=${enc(loc)}+農地+出售+site%3Arakuya.com.tw+OR+site%3Ahousefun.com.tw`, tag:'多站'},
    {name:'農地銀行', url:`https://www.google.com/search?q=農地銀行+${enc(loc)}`, tag:'官方'},
    {name:'實價登錄', url:`https://lvr.land.moi.gov.tw/`, tag:'官方'},
  ] : [
    {name:'591 房屋', url:`https://sale.591.com.tw/?kw=${enc(loc)}`, tag:'核心'},
    {name:'Google 房屋出售', url:`https://www.google.com/search?q=${enc(area+' '+loc)}+房屋+出售`, tag:'全網'},
    {name:'Google 地圖', url:`https://www.google.com/maps/search/?api=1&query=${enc(area+' '+loc)}`, tag:'地理'},
    {name:'信義/永慶/樂屋', url:`https://www.google.com/search?q=${enc(loc)}+出售+site%3Asinyi.com.tw+OR+site%3Ayungching.com.tw+OR+site%3Arakuya.com.tw`, tag:'多站'},
    {name:'實價登錄', url:`https://lvr.land.moi.gov.tw/`, tag:'官方'},
  ];

  let opened = 0;
  targets.slice(0,3).forEach(t=>{
    const w = window.open(t.url,'_blank');
    if(w) opened++;
  });

  panel.classList.add('show');
  panel.innerHTML = `
    <div class="fetch-list-title">${opened>=2 ? `✅ 已自動開啟 ${opened} 個分頁，下方為完整清單` : '⚠️ 瀏覽器擋下自動分頁，請點下方手動開啟'}</div>
    ${targets.map(t=>`
      <a class="fetch-item" href="${t.url}" target="_blank" style="text-decoration:none">
        <div class="fi-type">${t.tag}</div>
        <div class="fi-info">
          <div class="fi-title">${t.name}</div>
          <div class="fi-price" style="font-size:10px;color:var(--muted);font-weight:400">${t.url.replace(/^https?:\/\//,'').slice(0,52)}...</div>
        </div>
        <span class="fi-link">→</span>
      </a>
    `).join('')}
    <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--muted);line-height:1.7">
      💡 Google 搜尋會自動去除重複物件、整合多家平台。<br>若被瀏覽器擋分頁，請允許彈出視窗或逐個點擊。
    </div>
  `;
  btn.textContent = '🔄 再次開啟';
}
</script>

</body>
</html>
