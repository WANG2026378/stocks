<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>每日持股匯入工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;--bg4:#252a3d;--border:#2e3550;--text:#e8eaf0;--text2:#8892b0;--text3:#4a5478;--acc:#00d4aa;--acc2:#00b891;--acc3:rgba(0,212,170,.1);--up:#ff6b6b;--dn:#00d4aa;--radius:10px;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}
.app{max-width:900px;margin:0 auto;padding:20px 16px;}
.header{margin-bottom:24px;}.header-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.logo{width:36px;height:36px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header h1{font-size:20px;font-weight:700;color:var(--text);}.header p{font-size:12px;color:var(--text2);margin-top:4px;}
.steps{display:flex;margin-bottom:24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.step{flex:1;padding:10px 8px;text-align:center;font-size:11px;color:var(--text3);border-right:1px solid var(--border);transition:all .2s;}
.step:last-child{border-right:none;}.step.active{background:var(--acc3);color:var(--acc);font-weight:600;}.step.done{color:var(--acc2);background:rgba(0,184,145,.06);}
.step-num{display:block;font-size:16px;margin-bottom:2px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;color:var(--acc);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.tw{overflow-x:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;}
thead th{font-size:10px;font-weight:600;color:var(--text3);padding:8px 6px;text-align:right;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap;}
thead th:first-child{text-align:left;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}tbody tr:last-child{border-bottom:none;}tbody tr:hover{background:var(--bg4);}
td{padding:7px 6px;text-align:right;font-size:11px;}td:first-child{text-align:left;}
.sname{font-weight:600;font-size:12px;color:var(--text);}.scode{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.price-input{width:88px;padding:4px 6px;font-size:11px;font-family:'JetBrains Mono',monospace;border:1px solid var(--border);border-radius:5px;background:var(--bg3);color:var(--text);text-align:right;transition:border-color .15s;}
.price-input:focus{outline:none;border-color:var(--acc);}.price-input.changed{border-color:#f0a500;background:rgba(240,165,0,.08);}
.shares-input{width:72px;padding:4px 6px;font-size:11px;font-family:'JetBrains Mono',monospace;border:1px solid var(--border);border-radius:5px;background:var(--bg3);color:var(--text);text-align:right;transition:border-color .15s;}
.shares-input:focus{outline:none;border-color:var(--acc);}.shares-input.changed{border-color:#7c6fcd;background:rgba(124,111,205,.08);}
.cost-input{width:90px;padding:4px 6px;font-size:11px;font-family:'JetBrains Mono',monospace;border:1px solid var(--border);border-radius:5px;background:var(--bg3);color:var(--text);text-align:right;transition:border-color .15s;}
.cost-input:focus{outline:none;border-color:var(--acc);}.cost-input.changed{border-color:#ff6b6b;background:rgba(255,107,107,.08);}
.btn{font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);color:var(--text);cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;}
.btn:hover{border-color:var(--acc);color:var(--acc);}.btn.prim{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600;}.btn.prim:hover{background:var(--acc2);}
.btn.warn{background:rgba(240,165,0,.15);color:#f0a500;border-color:rgba(240,165,0,.4);}.btn.warn:hover{background:rgba(240,165,0,.25);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.date-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.date-label{font-size:12px;color:var(--text2);}
.date-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--acc);background:var(--acc3);padding:4px 10px;border-radius:6px;border:1px solid rgba(0,212,170,.2);}
.date-input{padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;}
.date-input:focus{outline:none;border-color:var(--acc);}
.status{padding:10px 14px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px;margin-top:12px;}
.status.ok{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);color:var(--acc);}
.status.err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:#ff6b6b;}
.status.info{background:rgba(255,165,0,.08);border:1px solid rgba(255,165,0,.25);color:#f0a500;}
.import-btn{width:100%;padding:14px;font-size:14px;font-weight:700;background:var(--acc);color:#000;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
.import-btn:hover{background:var(--acc2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,212,170,.25);}
.import-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed;transform:none;box-shadow:none;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:10px;color:var(--text3);margin-bottom:8px;}
.leg{display:flex;align-items:center;gap:4px;}.leg-dot{width:8px;height:8px;border-radius:2px;}
.add-row-form{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;padding:10px;background:var(--bg3);border-radius:8px;margin-top:8px;}
.add-row-form input{flex:1;min-width:80px;padding:5px 8px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:var(--bg2);color:var(--text);}
.add-row-form input:focus{outline:none;border-color:var(--acc);}
.add-row-form label{font-size:10px;color:var(--text3);white-space:nowrap;display:block;margin-bottom:2px;}
.hint{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.6;}
a{color:var(--acc);text-decoration:none;}a:hover{text-decoration:underline;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">📊</div>
      <div>
        <h1>每日持股匯入工具</h1>
        <p>輸入今日數值 → 一鍵寫入 wang2026378.github.io/stocks/</p>
      </div>
    </div>
  </div>
  <div class="steps" id="stepBar">
    <div class="step active" id="s1"><span class="step-num">①</span>編輯數值</div>
    <div class="step" id="s2"><span class="step-num">②</span>確認匯入</div>
    <div class="step" id="s3"><span class="step-num">③</span>完成</div>
  </div>
  <div class="date-bar">
    <span class="date-label">匯入日期：</span>
    <span class="date-val" id="todayDisplay"></span>
    <input type="date" class="date-input" id="dateInput" onchange="updateDateDisplay()"/>
  </div>
  <div class="card">
    <div class="card-title">📋 持股數值編輯 <span style="font-size:10px;font-weight:400;color:var(--text3);">（黃=市價 紫=股數 紅=成本 有修改時亮色）</span></div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#f0a500;"></div>市價已修改</div>
      <div class="leg"><div class="leg-dot" style="background:#7c6fcd;"></div>股數已修改</div>
      <div class="leg"><div class="leg-dot" style="background:#ff6b6b;"></div>成本已修改</div>
    </div>
    <div class="tw"><table id="stockTable">
      <thead><tr>
        <th style="width:90px;text-align:left;">商品</th>
        <th style="width:80px;">股數</th>
        <th style="width:90px;">市價</th>
        <th style="width:78px;">損益兩平</th>
        <th style="width:78px;">成交均價</th>
        <th style="width:100px;">投入成本</th>
        <th style="width:70px;">損益試算</th>
      </tr></thead>
      <tbody id="stockBody"></tbody>
    </table></div>
    <div class="btn-row">
      <button class="btn" onclick="addRowForm()">＋ 新增股票</button>
      <button class="btn warn" onclick="resetAll()">↩ 還原預設</button>
    </div>
    <div id="addForm" style="display:none;"></div>
  </div>
  <button class="import-btn" id="importBtn" onclick="doImport()">⬆ 寫入 localStorage 並匯入</button>
  <div id="statusBox" style="display:none;"></div>
</div>
<script>
const DEFAULT_STOCKS=[
  {code:'0050',name:'元大台灣50',shares:5,price:96.90,be:45.66,avg:45.40,cost:227},
  {code:'2301',name:'光寶科',shares:5888,price:224.00,be:186.08,avg:185.00,cost:1090863},
  {code:'2308',name:'台達電',shares:18,price:2245.00,be:2232.98,avg:2220.00,cost:40016},
  {code:'2312',name:'金寶',shares:3000,price:29.90,be:29.57,avg:29.40,cost:88325},
  {code:'2324',name:'仁寶',shares:2000,price:30.80,be:31.88,avg:31.70,cost:63489},
  {code:'2330',name:'台積電',shares:2030,price:2235.00,be:1895.59,avg:1884.57,cost:3831148},
  {code:'3711',name:'日月光投控',shares:8,price:537.00,be:512.98,avg:510.00,cost:4100},
  {code:'4585',name:'達明',shares:8,price:342.00,be:325.39,avg:323.50,cost:2591},
  {code:'4908',name:'前鼎',shares:1008,price:227.50,be:143.32,avg:142.49,cost:143841},
  {code:'5243',name:'乙盛-KY',shares:108,price:107.00,be:124.72,avg:124.00,cost:13412},
  {code:'6285',name:'啟碁',shares:19188,price:259.00,be:235.00,avg:233.64,cost:4489504},
  {code:'6829',name:'千附精密',shares:2000,price:225.50,be:179.04,avg:178.00,cost:356506},
  {code:'8033',name:'雷虎',shares:25,price:144.00,be:161.94,avg:161.00,cost:4045},
];
let currentStocks=JSON.parse(JSON.stringify(DEFAULT_STOCKS));
function initDate(){const t=new Date(),y=t.getFullYear(),m=String(t.getMonth()+1).padStart(2,'0'),d=String(t.getDate()).padStart(2,'0');document.getElementById('dateInput').value=`${y}-${m}-${d}`;updateDateDisplay();}
function updateDateDisplay(){const v=document.getElementById('dateInput').value;if(!v)return;const[y,m,d]=v.split('-');document.getElementById('todayDisplay').textContent=`${y}/${m}/${d}`;}
function fmtN(n){return Math.round(n).toLocaleString('zh-TW');}
function fmtF(n){return parseFloat(n).toFixed(2);}
function renderTable(){
  document.getElementById('stockBody').innerHTML=currentStocks.map((s,i)=>{
    const mv=s.shares*s.price,pnl=mv-s.cost,pct=s.cost>0?(pnl/s.cost*100):0;
    const def=DEFAULT_STOCKS.find(d=>d.code===s.code)||{};
    const pc=parseFloat(s.price)!==def.price?' changed':'';
    const sc=parseInt(s.shares)!==def.shares?' changed':'';
    const cc=parseFloat(s.cost)!==def.cost?' changed':'';
    return`<tr>
      <td><div class="sname">${s.name}</div><div class="scode">${s.code}</div></td>
      <td><input class="shares-input${sc}" type="number" value="${s.shares}" oninput="onInput(this,${i},'shares')"/></td>
      <td><input class="price-input${pc}" type="number" step="0.01" value="${s.price}" oninput="onInput(this,${i},'price')"/></td>
      <td><input class="price-input" type="number" step="0.01" value="${s.be}" oninput="onInput(this,${i},'be')"/></td>
      <td><input class="price-input" type="number" step="0.01" value="${s.avg}" oninput="onInput(this,${i},'avg')"/></td>
      <td><input class="cost-input${cc}" type="number" value="${s.cost}" oninput="onInput(this,${i},'cost')"/></td>
      <td class="${pnl>=0?'up':'dn'}" style="font-size:10px;font-family:'JetBrains Mono',monospace;" id="pnl${i}">${pnl>=0?'+':''}${fmtN(pnl)}<br><span style="opacity:.7;">${pnl>=0?'+':''}${fmtF(pct)}%</span></td>
    </tr>`;
  }).join('');
}
function onInput(el,i,field){
  const v=parseFloat(el.value);
  if(!isNaN(v)){
    currentStocks[i][field]=field==='shares'?parseInt(el.value)||0:v;
    const s=currentStocks[i],mv=s.shares*s.price,pnl=mv-s.cost,pct=s.cost>0?(pnl/s.cost*100):0;
    const td=document.getElementById('pnl'+i);
    td.className=pnl>=0?'up':'dn';td.style.cssText='font-size:10px;font-family:"JetBrains Mono",monospace;';
    td.innerHTML=`${pnl>=0?'+':''}${fmtN(pnl)}<br><span style="opacity:.7;">${pnl>=0?'+':''}${fmtF(pct)}%</span>`;
    const def=DEFAULT_STOCKS.find(d=>d.code===s.code)||{};
    if(field==='price')el.className='price-input'+(v!==def.price?' changed':'');
    if(field==='shares')el.className='shares-input'+(v!==def.shares?' changed':'');
    if(field==='cost')el.className='cost-input'+(v!==def.cost?' changed':'');
  }
}
function resetAll(){if(!confirm('還原為預設值？'))return;currentStocks=JSON.parse(JSON.stringify(DEFAULT_STOCKS));renderTable();setStatus('已還原。','info');}
function addRowForm(){
  const box=document.getElementById('addForm');box.style.display='block';
  box.innerHTML=`<div class="add-row-form">
    <div><label>代碼</label><input id="nc" placeholder="2330"/></div>
    <div><label>名稱</label><input id="nn" placeholder="台積電"/></div>
    <div><label>股數</label><input id="ns" type="number" placeholder="1000"/></div>
    <div><label>市價</label><input id="np" type="number" step="0.01" placeholder="850"/></div>
    <div><label>損益兩平</label><input id="nb" type="number" step="0.01"/></div>
    <div><label>成交均價</label><input id="na" type="number" step="0.01" placeholder="760"/></div>
    <div><label>投入成本</label><input id="nk" type="number" placeholder="760000"/></div>
    <div style="display:flex;gap:6px;"><button class="btn prim" onclick="confirmAdd()">新增</button><button class="btn" onclick="cancelAdd()">取消</button></div>
  </div>`;
}
function confirmAdd(){
  const g=id=>document.getElementById(id).value;
  const code=g('nc').trim(),name=g('nn').trim(),shares=parseInt(g('ns')),price=parseFloat(g('np')),avg=parseFloat(g('na')),cost=parseFloat(g('nk')),be=parseFloat(g('nb'))||avg;
  if(!code||!name||isNaN(shares)||isNaN(price)||isNaN(avg)||isNaN(cost)){alert('請填寫所有必要欄位');return;}
  currentStocks.push({code,name,shares,price,be,avg,cost});cancelAdd();renderTable();
}
function cancelAdd(){document.getElementById('addForm').style.display='none';document.getElementById('addForm').innerHTML='';}
function setStatus(msg,type='ok'){
  const box=document.getElementById('statusBox');box.style.display='flex';box.className='status '+type;
  box.innerHTML=`<span>${{ok:'✅',err:'❌',info:'ℹ️'}[type]}</span><span>${msg}</span>`;
}
function doImport(){
  const json=JSON.stringify(currentStocks);
  try{
    localStorage.setItem('tw_stocks_v5',json);
    setStatus('✅ 寫入成功！現在點這裡前往主頁面重整：<a href="/stocks/" style="color:var(--acc);font-weight:600;margin-left:6px;">→ 前往 stocks/</a>','ok');
    document.getElementById('s1').className='step done';
    document.getElementById('s2').className='step done';
    document.getElementById('s3').className='step active';
  }catch(e){
    setStatus('❌ 寫入失敗：'+e.message,'err');
  }
}
initDate();renderTable();
</script>
</body>
</html>
